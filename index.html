function setupChildDrag(){
  const pb = document.getElementById("parent-body");
  if(!pb) return;
  let D = null;

  pb.querySelectorAll(".drag-handle").forEach(handle => {
    handle.addEventListener("touchstart", e => {
      e.preventDefault();
      const card = handle.closest(".child-card");
      const allCards = [...pb.querySelectorAll(".child-card")];
      const idx = allCards.indexOf(card);
      const rects = allCards.map(c => c.getBoundingClientRect());
      const cardH = rects[idx].height;
      const gap = rects.length > 1
        ? (rects.length > idx+1 ? rects[idx+1].top : rects[idx-1].top + rects[idx-1].height) - rects[idx].top
        : cardH + 12;

      card.style.transition = "none";
      card.style.position = "relative";
      card.style.zIndex = "10";
      card.style.boxShadow = "0 8px 28px rgba(0,0,0,.16)";
      card.style.transform = "scale(1.02)";

      D = { card, allCards, idx, currentIdx:idx,
            startY:e.touches[0].clientY, rects, cardH, gap };
    }, {passive:false});

    handle.addEventListener("touchmove", e => {
      if(!D) return;
      e.preventDefault();
      const dy = e.touches[0].clientY - D.startY;
      D.card.style.transform = `scale(1.02) translateY(${dy}px)`;

      /* find closest card midpoint */
      const fingerY = D.rects[D.idx].top + dy + D.cardH / 2;
      let newIdx = D.idx;
      let minDist = Infinity;
      D.rects.forEach((r, i) => {
        const dist = Math.abs(fingerY - (r.top + r.height / 2));
        if(dist < minDist){ minDist = dist; newIdx = i; }
      });

      /* shift other cards to show insertion point */
      D.allCards.forEach((c, i) => {
        if(c === D.card) return;
        c.style.transition = "transform .15s ease";
        if(D.idx < newIdx && i > D.idx && i <= newIdx){
          c.style.transform = `translateY(-${D.gap}px)`;
        } else if(D.idx > newIdx && i >= newIdx && i < D.idx){
          c.style.transform = `translateY(${D.gap}px)`;
        } else {
          c.style.transform = "";
        }
      });
      D.currentIdx = newIdx;
    }, {passive:false});

    const onEnd = () => {
      if(!D) return;
      D.allCards.forEach(c => {
        c.style.transform = "";
        c.style.transition = "";
        c.style.zIndex = "";
        c.style.position = "";
        c.style.boxShadow = "";
      });
      if(D.currentIdx !== D.idx){
        const arr = [...state.children];
        const [moved] = arr.splice(D.idx, 1);
        arr.splice(D.currentIdx, 0, moved);
        state.children = arr;
        save();
        pb.innerHTML = parentChildren();
        setupChildDrag();
      }
      D = null;
    };
    handle.addEventListener("touchend", onEnd);
    handle.addEventListener("touchcancel", onEnd);
  });
}

function setupTplDrag(){
  const pb = document.getElementById("parent-body");
  if(!pb) return;
  let D = null;

  pb.querySelectorAll("[data-tpl-drag]").forEach(handle => {
    handle.addEventListener("touchstart", e => {
      e.preventDefault();
      const row = handle.closest(".tpl-row");
      const allRows = [...pb.querySelectorAll(".tpl-row")];
      const idx = allRows.indexOf(row);
      const rects = allRows.map(r => r.getBoundingClientRect());
      const rowH = rects[idx].height;
      const gap = rects.length > 1
        ? (idx+1 < rects.length ? rects[idx+1].top : rects[idx-1].top + rects[idx-1].height) - rects[idx].top
        : rowH + 2;
      row.style.transition = "none";
      row.style.position = "relative";
      row.style.zIndex = "10";
      row.style.background = "#fff";
      row.style.boxShadow = "0 4px 16px rgba(0,0,0,.12)";
      D = { row, allRows, idx, currentIdx:idx, startY:e.touches[0].clientY, rects, rowH, gap };
    },{passive:false});

    handle.addEventListener("touchmove", e => {
      if(!D) return;
      e.preventDefault();
      const dy = e.touches[0].clientY - D.startY;
      D.row.style.transform = `translateY(${dy}px)`;
      const fingerY = D.rects[D.idx].top + dy + D.rowH / 2;
      let newIdx = D.idx, minDist = Infinity;
      D.rects.forEach((r,i) => {
        const dist = Math.abs(fingerY - (r.top + r.height/2));
        if(dist < minDist){ minDist = dist; newIdx = i; }
      });
      D.allRows.forEach((r,i) => {
        if(r === D.row) return;
        r.style.transition = "transform .15s ease";
        if(D.idx < newIdx && i > D.idx && i <= newIdx)      r.style.transform = `translateY(-${D.gap}px)`;
        else if(D.idx > newIdx && i >= newIdx && i < D.idx) r.style.transform = `translateY(${D.gap}px)`;
        else                                                  r.style.transform = "";
      });
      D.currentIdx = newIdx;
    },{passive:false});

    const onEnd = () => {
      if(!D) return;
      D.allRows.forEach(r => { r.style.transform=""; r.style.transition=""; r.style.zIndex=""; r.style.position=""; r.style.boxShadow=""; r.style.background=""; });
      if(D.currentIdx !== D.idx){
        const arr = [...state.templates];
        const [moved] = arr.splice(D.idx, 1);
        arr.splice(D.currentIdx, 0, moved);
        state.templates = arr;
        save();
        refreshParentBody();
        setTimeout(setupTplDrag, 0);
      }
      D = null;
    };
    handle.addEventListener("touchend", onEnd);
    handle.addEventListener("touchcancel", onEnd);
  });
}

function fmtDate(ts){

  const jours = state.lang==="en"

  return jours[d.getDay()]+" "+pad(d.getDate())+"/"+pad(d.getMonth()+1)+" "+(state.lang==="en"?"at":"à")+" "+pad(d.getHours())+":"+pad(d.getMinutes());
}

function applyEvent(type, title, points, childIds){
  if(!state.notifications) state.notifications = [];
  const targets = childIds.length===0 ? state.children
    : state.children.filter(c=>childIds.includes(c.id));
  targets.forEach(c=>{
    const raw   = (type==="powerup"||type==="investment") ? Math.abs(points) : -Math.abs(points);
    const after = Math.max(0, c.points + raw);
    const delta = after - c.points; /* actual change (may be 0 if already at floor) */
    c.points = after;
    state.notifications.push({id:uid(), childId:c.id, type, points:Math.abs(points), delta, title, createdAt:Date.now()});
  });
  save();
}

/* ---- Sons Web Audio ---- */
function playPowerUpSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[659,0],[784,.12],[1319,.24],[1047,.36],[1175,.48],[1568,.60]].forEach(([f,dt])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="square"; o.frequency.value=f;
      g.gain.setValueAtTime(0.12, ctx.currentTime+dt);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dt+0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+dt); o.stop(ctx.currentTime+dt+0.13);
    });
  }catch(e){}
}
function playBombSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine";
    o.frequency.setValueAtTime(1400, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime+0.75);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.75);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.75);
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.4),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.08));
    const src=ctx.createBufferSource(); src.buffer=buf;
    const eg=ctx.createGain();
    eg.gain.setValueAtTime(0.5, ctx.currentTime+0.72);
    eg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.1);
    src.connect(eg); eg.connect(ctx.destination);
    src.start(ctx.currentTime+0.72); src.stop(ctx.currentTime+1.1);
  }catch(e){}
}

function playInvestmentSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    /* montée de pièces : do mi sol do' */
    [[523,0,0.07],[659,0.08,0.07],[784,0.16,0.07],[1047,0.24,0.12]].forEach(([f,dt,dur])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="triangle"; o.frequency.value=f;
      g.gain.setValueAtTime(0.18, ctx.currentTime+dt);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dt+dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+dt); o.stop(ctx.currentTime+dt+dur+0.01);
    });
    /* ching final */
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.type="sine"; o2.frequency.value=3136;
    g2.gain.setValueAtTime(0.14, ctx.currentTime+0.38);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.38+0.7);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(ctx.currentTime+0.38); o2.stop(ctx.currentTime+1.1);
    /* shimmer métallique */
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.18),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.025));
    const src=ctx.createBufferSource();
    const bpf=ctx.createBiquadFilter(); bpf.type="bandpass"; bpf.frequency.value=9000; bpf.Q.value=3;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(0.09,ctx.currentTime+0.37);
    src.buffer=buf; src.connect(bpf); bpf.connect(gn); gn.connect(ctx.destination);
    src.start(ctx.currentTime+0.37);
  }catch(e){}
}

/* ============ Couleur : assombrir un hex ============ */
function shade(hex, percent){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.max(0,Math.min(255,Math.round(r+(r*percent/100))));
  g=Math.max(0,Math.min(255,Math.round(g+(g*percent/100))));
  b=Math.max(0,Math.min(255,Math.round(b+(b*percent/100))));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ============ Modale ============ */
let modalScrollY = 0;
function lockBodyScroll(){
  if(document.body.classList.contains("modal-open")) return; /* déjà verrouillé (re-render du même modal) */
  modalScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.style.top = `-${modalScrollY}px`;
  document.body.classList.add("modal-open");
}
function unlockBodyScroll(){
  if(!document.body.classList.contains("modal-open")) return;
  document.body.classList.remove("modal-open");
  document.body.style.top = "";
  window.scrollTo(0, modalScrollY);
}
function closeModal(){ document.getElementById("modal-root").innerHTML=""; unlockBodyScroll(); }
function openModal(html){
  lockBodyScroll();
  document.getElementById("modal-root").innerHTML = `<div class="modal-bg" data-action="modal-bg"><div class="modal"><div class="modal-drag-bar"></div>${html}</div></div>`;
  setTimeout(setupModalSwipe, 0);
}
function setupModalSwipe(){
  const modal = document.querySelector("#modal-root .modal");
  if(!modal) return;
  let startY=0, startScroll=0, active=false;
  modal.addEventListener("touchstart", e=>{
    startY = e.touches[0].clientY;
    startScroll = modal.scrollTop;
    active = true;
  },{passive:true});
  modal.addEventListener("touchmove", e=>{
    if(!active) return;
    const dy = e.touches[0].clientY - startY;
    if(dy > 0 && (startScroll <= 0 || modal.scrollTop <= 0)){
      e.preventDefault();
      modal.style.transition = "none";
      modal.style.transform = `translateY(${Math.max(0,dy)}px)`;
    }
  },{passive:false});
  modal.addEventListener("touchend", e=>{
    if(!active) return; active = false;
    const dy = e.changedTouches[0].clientY - startY;
    if(dy > 80 && (startScroll <= 0 || modal.scrollTop <= 0)){
      modal.style.transition = "transform .22s ease";
      modal.style.transform = "translateY(110%)";
      setTimeout(closeModal, 230);
    } else {
      modal.style.transition = "transform .2s ease";
      modal.style.transform = "";
      setTimeout(()=>{ modal.style.transition=""; }, 210);
    }
  },{passive:true});
}

      <div class="wk-intro">${t("wkWeekIntro")} :</div>
      <div class="wk-cool-row">
        <button data-action="wk-cool-dec">−</button>
        <span>${n} ${t("wkDaysUnit")}</span>
        <button data-action="wk-cool-inc">+</button>
      </div>
    </div>`;
  } else if(f.weekMode==="workweek"){
    sub = `<div class="wk-sub"><div class="wk-hint">${t("wkWorkHint")}</div></div>`;
  } else if(f.weekMode==="weekend"){
    sub = `<div class="wk-sub"><div class="wk-hint">${t("wkWeekendHint")}</div></div>`;
  }

  return `<div class="wk-panel">
    <div class="wk-divider"></div>
    <label class="fld">${t("wkSectionTitle")}</label>
    <div class="wk-modes">${squares}</div>${sub}</div>`;
}

      <button class="btn btn-no" style="width:100%" data-action="del-period" data-id="${f.id}">${t("btnDeletePeriod")}</button>
    </div>` : ""}
  `);
}

/* ============ Sauvegarde / Restauration ============ */
function exportBackup(){
  state.lastBackupAt = Date.now();
  save();
  const d = new Date();
  const filename = "missions-sauvegarde-"+d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+".json";
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast(t("toastBackupDone"));
  render();
}
function handleRestoreFile(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = "";
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ toast(t("toastInvalidBackup")); return; }
    if(!data || !Array.isArray(data.children) || !Array.isArray(data.tasks) || !Array.isArray(data.rewards)){
      toast(t("toastInvalidBackup")); return;
    }
    if(confirm(t("confirmRestore"))){
      state = data;
      if(!state.lang) state.lang = "fr";
      save();
      go("lock");
      toast(t("toastRestored"));
    }
  };
  reader.readAsText(file);
}
document.getElementById("restore-input").addEventListener("change", handleRestoreFile);

/* ============ Gestion des clics ============ */
document.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;

  switch(a){
    /* langue */
    case "refresh-app": { const u=new URL(location.href); u.searchParams.set("_cb",Date.now()); location.replace(u.toString()); break; }
    case "toggle-lang":
      state.lang = state.lang==="fr" ? "en" : "fr"; save(); render(); break;
    case "set-lang":
      state.lang = el.dataset.lang; save(); render(); break;

    /* navigation accueil */
    case "open-child": go("child",{childId:id}); break;
    case "open-store": case "open-store2": go("store",{childId:id}); break;
    case "lock": go("lock"); break;

    /* enfant */
    case "do-task":
      markDone(id, view.childId);
      toast(t("toastSent"));
      render();
      break;
    case "undo-task":
      undoTask(id, view.childId);
      toast(t("toastUndoTask"));
      render();
      break;
    case "buy": {
      const r = reward(id); const k = child(el.dataset.child);
      if(k.points < r.cost){ toast(t("toastNotEnoughPts")); break; }
      if(confirm(t("confirmBuy",{title:r.title,cost:r.cost}))){
        buy(id, el.dataset.child);
        toast(t("toastBought"));
        render();
      }
      break;
    }

    /* espace parent (avec code) */
    case "open-parent":
      if(state.parentPin){ pinPrompt("enter"); }
      else { go("parent",{tab:"approbations"}); }
      break;
    case "check-pin": {
      const v=(document.getElementById("pin-in")||{}).value||"";
      if(v===state.parentPin){ closeModal(); go("parent",{tab:"approbations"}); }
      else { toast(t("toastWrongPin")); }
      break;
    }
    case "ptab": {
      const newTab = el.dataset.tab;
      if(newTab === view.tab) break;
      view.tab = newTab;
      /* update tab active state in-place */
      document.querySelectorAll("[data-action='ptab']").forEach(btn=>{
        btn.classList.toggle("active", btn.dataset.tab === newTab);
      });
      /* update body only — no scroll reset */
      let body = "";
      if(newTab==="approbations") body = parentApprovals();
      if(newTab==="taches")       body = parentTasks();
      if(newTab==="evenements")   body = parentEvents();
      if(newTab==="periodes")     body = parentPeriods();
      if(newTab==="boutique")     body = parentRewards();
      if(newTab==="enfants")        body = parentChildren();
      if(newTab==="investissement") body = parentInvestissement();
      if(newTab==="reglages")       body = parentSettings();
      const pb = document.getElementById("parent-body");
      if(pb) pb.innerHTML = body;
      if(newTab === "enfants") setTimeout(setupChildDrag, 0);
      break;
    }

    /* achats boutique */
    case "cancel-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "cancelled";
        const k = child(p.childId);
        if(k){ k.points = (k.points||0) + p.cost; showRefundAnim(p.cost); }
        state.purchases = state.purchases.filter(x=>x.id!==id);
        save(); render();
      }
      break;
    }
    case "approve-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "approved"; p.approvedAt = Date.now();
        save(); refreshParentBody();
        /* also refresh child history if visible */
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const k=child(p.childId); if(k) hist.innerHTML=renderRewardHistory(k); }
      }
      break;
    }
    case "refuse-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "refused"; p.refusedAt = Date.now();
        const k = child(p.childId);
        if(k){ k.points = (k.points||0) + p.cost; }
        save(); refreshParentBody();
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const kk=child(p.childId); if(kk) hist.innerHTML=renderRewardHistory(kk); }
      }
      break;
    }
    case "mark-given": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="approved"){
        p.status = "given"; p.givenAt = Date.now();
        save(); refreshParentBody();
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const k=child(p.childId); if(k) hist.innerHTML=renderRewardHistory(k); }
      }
      break;
    }

    /* validations */
    case "approve": approve(id); toast(t("toastApproved")); render(); break;
    case "reject":  reject(id);  toast(t("toastRejected")); render(); break;
    case "appr-ext-keep":   approveExtremeComp(id, false); toast(t("toastApproved")); render(); break;
    case "appr-ext-finish": approveExtremeComp(id, true);  toast(t("toastApproved")); render(); break;
    case "rej-ext-start":   rejectingComp = id;   refreshParentBody(); break;
    case "rej-ext-cancel":  rejectingComp = null; refreshParentBody(); break;
    case "rej-ext-confirm": {
      const inp = document.getElementById("rej-pen-"+id);
      const pen = inp ? (parseInt(inp.value,10)||0) : 0;
      rejectingComp = null;
      rejectExtremeConfirm(id, pen);
      toast(t("toastRejected")); render(); break;
    }

    /* missions */
    case "new-task": taskForm(null); break;
    case "edit-task": taskForm(task(id)); break;
    case "del-task":
      if(confirm(t("confirmDelTask"))){
        state.tasks = state.tasks.filter(tsk=>tsk.id!==id);
        state.completions = state.completions.filter(c=>c.taskId!==id);
        save(); render();
      }
      break;
    case "toggle-tpl-edit":
      tplEditMode = !tplEditMode; refreshParentBody();
      if(tplEditMode) setTimeout(setupTplDrag, 0);
      break;
    case "edit-tpl": {
      const idx = parseInt(el.dataset.idx,10);
      const tsk = state.templates[idx];
      if(tsk){ tplFormState={idx, title:tsk.title, points:tsk.points}; drawTplForm(); }
      break;
    }
    case "del-tpl": {
      const idx = parseInt(el.dataset.idx,10);
      state.templates.splice(idx,1); save(); refreshParentBody(); break;
    }
    case "save-tpl": {
      const title=(document.getElementById("tpl-title").value||"").trim();
      const pts=Math.max(1,parseInt(document.getElementById("tpl-points").value,10)||1);
      if(!title){ toast(t("toastNeedTaskName")); break; }
      if(tplFormState.idx>=0){ state.templates[tplFormState.idx]={title,points:pts}; }
      else { state.templates.push({title,points:pts}); }
      save(); closeModal(); refreshParentBody(); break;
    }
    case "tpl":
      formState = {
        id:null, type:"mission", extremeMode:"solo", allDayRequired:false, periodRequired:true,
        title:el.dataset.title, points:parseInt(el.dataset.points,10), freq:"daily",
        childIds:state.children[0]?[state.children[0].id]:[],
        periodId:"allday", carryOn:false, carryOnPenalty:0, incompletePenalty:0,
        calDates:[], calYear:new Date().getFullYear(), calMonth:new Date().getMonth(),
        weekMode:null, weekDays:[], weekCooldown:4,
        monthMode:null, monthDays:[], monthCooldown:14, monthWindow:7, monthWeekdays:[],
        showCalPicker:false, addAsTemplate:false,
      };
      taskFormScroll = 0;
      drawTaskForm();
      break;
    case "pick-task-type": captureTaskForm(); formState.type=el.dataset.type; drawTaskForm(); break;
    case "pick-extreme-mode": captureTaskForm(); formState.extremeMode=el.dataset.mode; drawTaskForm(); break;
    case "pick-allday-req": formState.allDayRequired = !formState.allDayRequired; el.classList.toggle("on", formState.allDayRequired); break;
    case "pick-period-req": formState.periodRequired = !formState.periodRequired; el.classList.toggle("on", formState.periodRequired); break;
    case "pick-kid": {
      if(formState.id) break;
      captureTaskForm();
      const arr=[...(formState.childIds||[])];
      const idx=arr.indexOf(id);
      if(idx===-1){ arr.push(id); } else if(arr.length>1){ arr.splice(idx,1); }
      formState.childIds=arr; drawTaskForm(); break;
    }
    case "pick-freq":
      captureTaskForm();
      formState.prevFreq = formState.freq;
      formState.freq = el.dataset.f;
      if(formState.freq === "calendar"){ formState.showCalPicker = true; }
      drawTaskForm();
      break;
    case "pick-week-mode":
      captureTaskForm();
      formState.weekMode = el.dataset.m;
      if(formState.weekMode==="days" && !formState.weekDays) formState.weekDays=[];
      if(formState.weekMode==="week" && formState.weekCooldown==null) formState.weekCooldown=4;
      drawTaskForm();
      break;
    case "toggle-wk-day": {
      if(!formState.weekDays) formState.weekDays=[];
      const d = parseInt(el.dataset.d,10);
      const i = formState.weekDays.indexOf(d);
      if(i===-1) formState.weekDays.push(d); else formState.weekDays.splice(i,1);
      el.classList.toggle("cal-sel", i===-1);
      break;
    }
    case "wk-cool-dec":
      captureTaskForm();
      formState.weekCooldown = Math.max(0, (formState.weekCooldown!=null?formState.weekCooldown:4) - 1);
      drawTaskForm();
      break;
    case "wk-cool-inc":
      captureTaskForm();
      formState.weekCooldown = Math.min(5, (formState.weekCooldown!=null?formState.weekCooldown:4) + 1);
      drawTaskForm();
      break;
    case "pick-month-mode":
      captureTaskForm();
      formState.monthMode = el.dataset.m;
      if(formState.monthMode==="day"    && !formState.monthDays)    formState.monthDays=[];
      if(formState.monthMode==="nthday" && !formState.monthWeekdays) formState.monthWeekdays=[];
      if(formState.monthMode==="month" && formState.monthCooldown==null) formState.monthCooldown=14;
      if((formState.monthMode==="start"||formState.monthMode==="end") && formState.monthWindow==null) formState.monthWindow=7;
      drawTaskForm();
      break;
    case "toggle-mth-weekday": {
      if(!formState.monthWeekdays) formState.monthWeekdays=[];
      const week = el.dataset.week==="last" ? "last" : parseInt(el.dataset.week,10);
      const dow  = parseInt(el.dataset.dow,10);
      const idx  = formState.monthWeekdays.findIndex(s=>s.week===week && s.dow===dow);
      if(idx===-1) formState.monthWeekdays.push({week,dow}); else formState.monthWeekdays.splice(idx,1);
      el.classList.toggle("on", idx===-1);
      break;
    }
    case "pick-month-day": {
      if(!formState.monthDays) formState.monthDays=[];
      const dv = parseInt(el.dataset.d, 10);
      const di = formState.monthDays.indexOf(dv);
      if(di===-1) formState.monthDays.push(dv); else formState.monthDays.splice(di,1);
      el.classList.toggle("on", di===-1);
      break;
    }
    case "mth-cool-dec":
      captureTaskForm();
      formState.monthCooldown = Math.max(0, (formState.monthCooldown!=null?formState.monthCooldown:14) - 1);
      drawTaskForm();
      break;
    case "mth-cool-inc":
      captureTaskForm();
      formState.monthCooldown = Math.min(28, (formState.monthCooldown!=null?formState.monthCooldown:14) + 1);
      drawTaskForm();
      break;
    case "mth-win-dec":
      captureTaskForm();
      formState.monthWindow = Math.max(1, (formState.monthWindow!=null?formState.monthWindow:7) - 1);
      drawTaskForm();
      break;
    case "mth-win-inc":
      captureTaskForm();
      formState.monthWindow = Math.min(15, (formState.monthWindow!=null?formState.monthWindow:7) + 1);
      drawTaskForm();
      break;
    case "cal-prev":
      formState.calMonth--; if(formState.calMonth<0){ formState.calMonth=11; formState.calYear--; }
      openModal(drawCalPicker()); break;
    case "cal-next":
      formState.calMonth++; if(formState.calMonth>11){ formState.calMonth=0; formState.calYear++; }
      openModal(drawCalPicker()); break;
    case "cal-day": {
      const ds = el.dataset.date;
      if(!formState.calDates) formState.calDates=[];
      const idx = formState.calDates.indexOf(ds);
      if(idx===-1) formState.calDates.push(ds); else formState.calDates.splice(idx,1);
      el.classList.toggle("cal-sel", idx===-1);
      break;
    }
    case "cal-apply":
      formState.showCalPicker = false;
      drawTaskForm();
      break;
    case "cal-cancel-picker":
      formState.showCalPicker = false;
      if(!formState.calDates||formState.calDates.length===0) formState.freq = formState.prevFreq||"daily";
      drawTaskForm();
      break;
    case "pick-add-as-tpl":
      formState.addAsTemplate = !formState.addAsTemplate;
      el.classList.toggle("on", formState.addAsTemplate);
      break;
    case "pick-carry-on": {
      formState.carryOn = !formState.carryOn;
      el.classList.toggle("on", formState.carryOn);
      const sec = document.getElementById("carry-penalty-section");
      if(sec) {
        sec.style.transition = "max-height .75s ease, opacity .75s ease";
        sec.style.maxHeight = formState.carryOn ? "150px" : "0";
        sec.style.opacity = formState.carryOn ? "1" : "0";
      }
      break;
    }
    case "save-task": {
      const title=(document.getElementById("f-title").value||"").trim();
      const points=Math.max(1, parseInt(document.getElementById("f-points").value,10)||1);
      if(!title){ toast(t("toastNeedTaskName")); break; }
      const periodId=(document.getElementById("f-period")||{}).value||"allday";
      const carryOn=formState.carryOn;
      const carryOnPenalty=carryOn?(parseInt(((document.getElementById("f-carry-penalty")||{}).value||"0"),10)||0):0;
      const incompletePenalty=parseInt(((document.getElementById("f-incomplete-penalty")||{}).value||"0"),10)||0;
      const isExtremeT = formState.type==="extreme";
      const extremeMode = isExtremeT ? formState.extremeMode : undefined;
      const allDayRequired = isExtremeT ? !!formState.allDayRequired : false;
      const periodRequired = isExtremeT ? (formState.periodRequired !== false) : undefined;
      const isShared = isExtremeT && ["competitive","collab","all"].includes(formState.extremeMode);
      const calDates = formState.freq==="calendar" ? (formState.calDates||[]).slice().sort() : undefined;
      const isWeekly = formState.freq==="weekly";
      const weekMode = isWeekly ? (formState.weekMode||"week") : undefined;
      const weekDays = (isWeekly && weekMode==="days") ? (formState.weekDays||[]).slice() : undefined;
      const weekCooldown = (isWeekly && weekMode==="week") ? (formState.weekCooldown!=null?formState.weekCooldown:4) : undefined;
      const isMonthly = formState.freq==="monthly";
      const monthMode = isMonthly ? (formState.monthMode||"month") : undefined;
      const monthDays = (isMonthly && monthMode==="day") ? (formState.monthDays||[]).slice().sort((a,b)=>a-b) : undefined;
      const monthWeekdays = (isMonthly && monthMode==="nthday") ? (formState.monthWeekdays||[]).slice() : undefined;
      const monthCooldown = (isMonthly && monthMode==="month") ? (formState.monthCooldown!=null?formState.monthCooldown:14) : undefined;
      const monthWindow   = (isMonthly && (monthMode==="start"||monthMode==="end")) ? (formState.monthWindow!=null?formState.monthWindow:7) : undefined;
      if(formState.id){
        const tsk=task(formState.id);
        tsk.title=title; tsk.points=points; tsk.freq=formState.freq; tsk.type=formState.type;
        tsk.extremeMode=extremeMode; tsk.allDayRequired=allDayRequired; tsk.periodRequired=periodRequired;
        tsk.periodId=periodId; tsk.carryOn=carryOn; tsk.carryOnPenalty=carryOnPenalty; tsk.incompletePenalty=incompletePenalty;
        tsk.calDates=calDates;
        tsk.weekMode=weekMode; tsk.weekDays=weekDays; tsk.weekCooldown=weekCooldown;
        tsk.monthMode=monthMode; tsk.monthDays=monthDays; tsk.monthCooldown=monthCooldown; tsk.monthWindow=monthWindow; tsk.monthWeekdays=monthWeekdays;
      } else if(isShared){
        state.tasks.push({
          id:uid(), type:"extreme", extremeMode, allDayRequired, periodRequired,
          title, points, freq:formState.freq, childIds:[...(formState.childIds||[])],
          periodId, carryOn, carryOnPenalty, incompletePenalty, calDates, weekMode, weekDays, weekCooldown, monthMode, monthDays, monthCooldown, monthWindow, monthWeekdays, createdAt:Date.now(),
        });
      } else {
        (formState.childIds||[]).forEach(cid=>{
          state.tasks.push({
            id:uid(), type:formState.type, extremeMode, allDayRequired, periodRequired,
            title, points, freq:formState.freq, childId:cid,
            periodId, carryOn, carryOnPenalty, incompletePenalty, calDates, weekMode, weekDays, weekCooldown, monthMode, monthDays, monthCooldown, monthWindow, monthWeekdays, createdAt:Date.now(),
          });
        });
      }
      if(formState.addAsTemplate && title){
        state.templates.push({title, points});
      }
      save(); closeModal(); render(); toast(t("toastTaskSaved")); break;
    }

    /* récompenses */
    case "new-reward": rewardForm(null); break;
    case "edit-reward": rewardForm(reward(id)); break;
    case "del-reward":
      if(confirm(t("confirmDelReward"))){
        state.rewards = state.rewards.filter(r=>r.id!==id); save(); render();
      }
      break;
    case "save-reward": {
      const title=(document.getElementById("r-title").value||"").trim();
      const cost=Math.max(1, parseInt(document.getElementById("r-cost").value,10)||1);
      const emoji=(document.getElementById("r-emoji").value||"🎁").trim()||"🎁";
      if(!title){ toast(t("toastNeedRewardName")); break; }
      if(formState.id){
        const r=reward(formState.id); r.title=title; r.cost=cost; r.emoji=emoji;
      } else {
        state.rewards.push({id:uid(), title, cost, emoji});
      }
      save(); closeModal(); render(); toast(t("toastRewardSaved"));
      break;
    }

    /* événements */
    case "new-event": newEventForm(); break;

    /* application rapide d'événement */
    case "qev-type": {
      const ti=document.getElementById("qev-title"); if(ti) evQuick.title=ti.value;
      evQuick.type=el.dataset.v;
      const pb=document.getElementById("parent-body"); if(pb) pb.innerHTML=parentEvents();
      break;
    }
    case "qev-pts-up": {
      evQuick.points++;
      const d=document.getElementById("qev-pts"); if(d) d.textContent=evQuick.points;
      break;
    }
    case "qev-pts-down": {
      evQuick.points=Math.max(1,evQuick.points-1);
      const d2=document.getElementById("qev-pts"); if(d2) d2.textContent=evQuick.points;
      break;
    }
    case "qev-kid-tog": {
      const kid=el.dataset.id;
      const idx=evQuick.childIds.indexOf(kid);
      if(idx>=0) evQuick.childIds.splice(idx,1); else evQuick.childIds.push(kid);
      el.classList.toggle("on", evQuick.childIds.includes(kid));
      const c2=state.children.find(x=>x.id===kid);
      if(c2) el.style.color=evQuick.childIds.includes(kid)?"":c2.color;
      break;
    }
    case "qev-apply": {
      const title=(document.getElementById("qev-title").value||"").trim();
      if(!title){ toast(t("toastNeedTaskName")); break; }
      if(evQuick.childIds.length===0){ toast(t("toastSelectChild")); break; }
      applyEvent(evQuick.type, title, evQuick.points, evQuick.childIds);
      toast(t(evQuick.type==="powerup"?"toastPowerUpApplied":"toastBombApplied"));
      evQuick={type:"powerup",title:"",points:5,childIds:[]};
      const pb2=document.getElementById("parent-body"); if(pb2) pb2.innerHTML=parentEvents();
      break;
    }
    case "qev-save-tpl": {
      const title2=(document.getElementById("qev-title").value||"").trim();
      if(!title2){ toast(t("toastNeedTaskName")); break; }
      if(!state.eventTemplates) state.eventTemplates=[];
      state.eventTemplates.push({id:uid(), type:evQuick.type, title:title2, points:evQuick.points, childIds:[]});
      save();
      const pb3=document.getElementById("parent-body"); if(pb3) pb3.innerHTML=parentEvents();
      toastColored(t("qevTplSaved"),"#23214A",2500);
      break;
    }
    case "qev-reset": {
      evQuick={type:"powerup",title:"",points:5,childIds:[]};
      const pb4=document.getElementById("parent-body"); if(pb4) pb4.innerHTML=parentEvents();
      break;
    }

    case "pick-ev-type": {
      const ti=document.getElementById("ev-title"), pi=document.getElementById("ev-points");
      if(ti) eventFormState.title=ti.value;
      if(pi) eventFormState.points=Math.max(1,Math.abs(parseInt(pi.value)||5));
      eventFormState.type=el.dataset.v;
      drawEventForm(); break;
    }
    case "pick-ev-kid": {
      const kid=el.dataset.id;
      if(kid==="all"){ eventFormState.childIds=[]; }
      else {
        const idx=eventFormState.childIds.indexOf(kid);
        if(idx>=0) eventFormState.childIds.splice(idx,1);
        else eventFormState.childIds.push(kid);
        if(eventFormState.childIds.length===state.children.length) eventFormState.childIds=[];
      }
      document.querySelectorAll("[data-action='pick-ev-kid']").forEach(btn=>{
        const isAll=btn.dataset.id==="all";
        btn.classList.toggle("on", isAll ? eventFormState.childIds.length===0 : eventFormState.childIds.includes(btn.dataset.id));
      });
      break;
    }
    case "pick-ev-save-tpl": {
      eventFormState.saveAsTemplate=!eventFormState.saveAsTemplate;
      el.classList.toggle("on", eventFormState.saveAsTemplate);
      break;
    }

/* ============ Moteur de pénalités automatiques ============
   Lancé au chargement + à chaque retour au premier plan.

   carryOnPenalty  → réduit les points de la tâche (pas de bombe), une seule fois.
                     Stocké dans state.carryPenalties["taskId|childId"] = adjPts.
   incompletePenalty → bombe "nom : non complétée", une fois par occurrence de période.

   state.penaltyLog["key"] = dateStr  empêche la double application.
   "pending" (soumis, attente approbation) = exempt.
============================================================ */
function applyInvestment(){
  if(state.paused) return;
  if(!state.investment) state.investment = {enabled:true, rate:2, freq:"daily"};
  const inv = state.investment;
  if(!inv.enabled) return;

  const today = todayStr();
  const lastApplied = state.lastInvestmentApplied || "";

  /* Calculer la date de déclenchement la plus récente */
  let triggerDate = "";
  if(inv.freq === "daily"){
    triggerDate = today;
  } else if(inv.freq === "weekly"){
    const d = new Date();
    const daysBack = (d.getDay() - 5 + 7) % 7; /* jours depuis le vendredi */
    const fri = new Date(d);
    fri.setDate(d.getDate() - daysBack);
    triggerDate = fri.getFullYear() + "-" + pad(fri.getMonth()+1) + "-" + pad(fri.getDate());
  } else if(inv.freq === "monthly"){
    const d = new Date();
    triggerDate = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-01";
  }

  if(!triggerDate || lastApplied >= triggerDate) return;

  state.lastInvestmentApplied = today;
  state.children.forEach(c => {
    if(c.points <= 0) return;
    const gain = Math.ceil(c.points * inv.rate / 100);
    if(gain <= 0) return;
    applyEvent("investment", t("invEventTitle"), gain, [c.id]);
  });
  save();
}

function applyPenalties(){
  if(state.paused) return;
  if(!state.penaltyLog)    state.penaltyLog    = {};
  if(!state.carryPenalties) state.carryPenalties = {};

  const now    = new Date();
  const nowStr = pad(now.getHours()) + ":" + pad(now.getMinutes());
  const today  = todayStr();
  let changed  = false;

  /* prune push records older than yesterday (no longer needed) */
  if(state.pushes){
    const yStr = yesterdayStr();
    const before = state.pushes.length;
    state.pushes = state.pushes.filter(p => p.pushedDate === today || p.pushedDate === yStr);
    if(state.pushes.length !== before) changed = true;
  }

  /* prune forceUnlocked records older than today */
  if(state.forceUnlocked && state.forceUnlocked.length){
    const before2 = state.forceUnlocked.length;
    state.forceUnlocked = state.forceUnlocked.filter(x => x.unlockedDate === today);
    if(state.forceUnlocked.length !== before2) changed = true;
  }

  const todayDowP = now.getDay();
  /* — Passe 1 : pénalités de fin de période — */
  state.tasks.forEach(tsk => {
    if(!tsk.carryOnPenalty && !tsk.incompletePenalty) return;
    if(tsk.freq==="weekdays" && (todayDowP===0||todayDowP===6)) return;
    if(tsk.freq==="calendar" && !(tsk.calDates||[]).includes(today)) return;
    if(tsk.freq==="weekly"){
      if((tsk.weekMode||"week")!=="days") return;              /* week/workweek/weekend → Passe 3 */
    }
    if(tsk.freq==="monthly"){
      const mm = tsk.monthMode||"month";
      if(mm!=="day" && mm!=="nthday") return;   /* month/start/end → Passe 4 */
      const activeDays = mm==="nthday" ? resolveMonthWeekdays(tsk,now) : effectiveMonthDays(tsk,now);
      if(!activeDays.includes(now.getDate())) return;
    }
    const p = period(tsk.periodId);
    if(!p || p.isAllDay) return;       /* pas de limite horaire pour all-day */
    if(nowStr <= p.endTime) return;    /* période pas encore terminée */

    const pk = taskPK(tsk);

    taskChildIds(tsk).forEach(cid => {
      const st = taskStatusFor(tsk, cid);
      if(st === "done" || st === "pending" || st === "skipped" || isPushedTomorrow(tsk, cid)) return; /* complété, soumis, ignoré ou remis → exempt */

      /* réduction de report : modifie les pts de la tâche pour cet enfant, une fois */
      if(tsk.carryOn && tsk.carryOnPenalty > 0){
        const logKey = `${tsk.id}|${cid}|carry`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          state.carryPenalties[`${tsk.id}|${cid}`] =
            Math.max(0, tsk.points - tsk.carryOnPenalty);
          changed = true;
        }
      }

      /* pénalité d'incomplétion (sans carry-on) → bombe */
      if(!tsk.carryOn && tsk.incompletePenalty > 0){
        const logKey = `${tsk.id}|${cid}|${pk}|incomplete`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          applyEvent("bomb",
            esc(tsk.title) + " : " + t("incompleteSuffix"),
            tsk.incompletePenalty, [cid]);
          changed = true;
        }
      }
    });
  });

  /* — Passe 2 : pénalités de fin de journée (carryOn + incompletePenalty) — */
  const lastDay = state.lastDayChecked || today;
  if(lastDay !== today){
    const prevDate = new Date(lastDay + "T12:00:00");

    state.tasks.forEach(tsk => {
      if(!tsk.carryOn || !tsk.incompletePenalty) return;
      const prevDow = prevDate.getDay();
      if(tsk.freq==="weekdays" && (prevDow===0||prevDow===6)) return;
      if(tsk.freq==="calendar" && !(tsk.calDates||[]).includes(lastDay)) return;
      if(tsk.freq==="weekly"){
        if((tsk.weekMode||"week")!=="days") return;            /* week/workweek/weekend → Passe 3 */
        if(!(tsk.weekDays||[]).includes(prevDow)) return;
      }
      if(tsk.freq==="monthly"){
        if((tsk.monthMode||"month")!=="day") return;           /* month/start/end → Passe 4 */
        const mmP = tsk.monthMode||"month";
        if(mmP!=="day" && mmP!=="nthday") return;
        const activeDaysP = mmP==="nthday" ? resolveMonthWeekdays(tsk,prevDate) : effectiveMonthDays(tsk,prevDate);
        if(!activeDaysP.includes(prevDate.getDate())) return;
      }
      const p = period(tsk.periodId);
      if(!p || p.isAllDay) return;

      const prevPk = taskPK(tsk, prevDate);
      const currPk = taskPK(tsk);
      if(prevPk === currPk) return; /* même occurrence de fréquence → rien */

      taskChildIds(tsk).forEach(cid => {
        /* complétion (approuvée ou soumise) dans la période précédente → exempt */
        const prevDone = state.completions.some(x =>
          x.taskId===tsk.id && x.childId===cid && x.periodKey===prevPk);
        if(prevDone) return;

        const logKey = `${tsk.id}|${cid}|${prevPk}|incomplete-eod`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          applyEvent("bomb",
            esc(tsk.title) + " : " + t("incompleteSuffix"),
            tsk.incompletePenalty, [cid]);
          changed = true;
        }
      });
    });

    state.lastDayChecked = today;
    changed = true;
  }

  /* — Passe 3 : pénalités de fin d'occurrence hebdo (1x/sem, 1x/sem travail, 1x/fds) — */
  state.tasks.forEach(tsk => {
    if(tsk.freq!=="weekly") return;
    if((tsk.weekMode||"week")==="days") return;   /* géré comme quotidien (Passes 1-2) */
    if(!tsk.incompletePenalty) return;

    /* occurrence à vérifier : la plus récente dont la fenêtre est fermée */
    let occ = weekWindow(tsk, now);
    if(now <= occ.end) occ = weekWindow(tsk, new Date(now.getTime() - 7*86400000));
    if(now <= occ.end) return;   /* rien de fermé */
    if(tsk.createdAt && occ.start.getTime() < tsk.createdAt) return; /* occurrence antérieure à la création */

    taskChildIds(tsk).forEach(cid => {
      /* complétion (approuvée ou soumise) pour cette occurrence → exempt */
      const done = state.completions.some(x =>
        x.taskId===tsk.id && x.childId===cid && x.periodKey===occ.key);
      if(done) return;
      if(state.skips  && state.skips.some( x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===occ.key)) return;

      const logKey = `${tsk.id}|${cid}|${occ.key}|wk-incomplete`;
      if(!state.penaltyLog[logKey]){
        state.penaltyLog[logKey] = today;
        applyEvent("bomb",
          esc(tsk.title) + " : " + t("incompleteSuffix"),
          tsk.incompletePenalty, [cid]);
        changed = true;
      }
    });
  });

  /* — Passe 4 : pénalités de fin d'occurrence mensuelle (1x/mois, début, fin) — */
  state.tasks.forEach(tsk => {
    if(tsk.freq!=="monthly") return;
    if((tsk.monthMode||"month")==="day") return;   /* géré comme quotidien (Passes 1-2) */
    if(!tsk.incompletePenalty) return;

    /* occurrence à vérifier : le mois le plus récent dont la fenêtre est fermée */
    let occ = monthWindow(tsk, now);
    if(now <= occ.end){
      const prevMonth = new Date(now.getFullYear(), now.getMonth()-1, 15);
      occ = monthWindow(tsk, prevMonth);
    }
    if(now <= occ.end) return;
    if(tsk.createdAt && occ.start.getTime() < tsk.createdAt) return;

    taskChildIds(tsk).forEach(cid => {
      const done = state.completions.some(x =>
        x.taskId===tsk.id && x.childId===cid && x.periodKey===occ.key);
      if(done) return;
      if(state.skips  && state.skips.some( x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===occ.key)) return;

      const logKey = `${tsk.id}|${cid}|${occ.key}|mth-incomplete`;
      if(!state.penaltyLog[logKey]){
        state.penaltyLog[logKey] = today;
        applyEvent("bomb",
          esc(tsk.title) + " : " + t("incompleteSuffix"),
          tsk.incompletePenalty, [cid]);
        changed = true;
      }
    });
  });

  if(changed) save();
}

applyPenalties();
applyInvestment();
cleanupPurchases();
document.addEventListener("visibilitychange", () => {
  if(!document.hidden){ applyPenalties(); applyInvestment(); cleanupPurchases(); }
});

render();
if(new Date().getDay()===1 && state.lastMondayReminderDate!==todayStr()){
  openBackupReminderModal();
}

/* ---- Refresh automatique le dimanche ---- */
(function(){
  const KEY = "missions_sunday_reload";
  function checkSundayReload(){
    if(new Date().getDay() !== 0) return;          // pas dimanche
    const today = todayStr();
    if(localStorage.getItem(KEY) === today) return; // déjà fait aujourd'hui
    localStorage.setItem(KEY, today);
    location.reload(true);
  }
  checkSundayReload();
  document.addEventListener("visibilitychange", () => { if(!document.hidden) checkSundayReload(); });
})();
</script>
</body>
