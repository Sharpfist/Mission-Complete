<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mission Récompenses</title>
<style>
  :root{
    --ink:#23214A;
    --ink-soft:#6A6790;
    --cream:#FBF6EC;
    --card:#FFFFFF;
    --gold:#FFC53D;
    --gold-deep:#E89B0C;
    --c1:#FF6B6B;
    --c2:#1FB6A6;
    --c3:#8B7FF5;
    --good:#2BB673;
    --wait:#F2A33C;
    --line:#ECE6DA;
    --shadow:0 10px 30px rgba(35,33,74,.10);
    --radius:22px;
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 110% -10%, rgba(255,197,61,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(139,127,245,.16), transparent 55%),
      var(--cream);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 120px;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .pill{display:inline-flex;align-items:center;gap:8px;font-weight:800;}
  .coin{
    display:inline-flex;align-items:center;gap:7px;
    background:linear-gradient(180deg,#FFE08A,var(--gold));
    color:#6b4a00;border-radius:999px;padding:6px 14px;font-weight:900;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.08);
  }
  .coin .dot{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff6cf,var(--gold-deep));box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);}

  /* ---------- LOCK / CHOOSE ---------- */
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 4px;}
  .brand .logo{font-size:30px}
  .brand h1{font-size:26px}
  .tagline{text-align:center;color:var(--ink-soft);font-weight:600;margin:0 0 22px;font-size:15px}
  .who-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .who{
    position:relative;background:var(--card);border-radius:var(--radius);padding:22px 14px;text-align:center;
    box-shadow:var(--shadow);border:3px solid transparent;transition:transform .12s ease;
  }
  .who:active{transform:scale(.97)}
  .ev-q{position:absolute;top:7px;right:8px;width:24px;height:24px;border-radius:50%;
    background:#FF6B00;color:#fff;font-size:14px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
    animation:shake-q .65s ease-in-out infinite}
  @keyframes shake-q{0%,100%{transform:translateX(0)}22%{transform:translateX(-4px)}44%{transform:translateX(4px)}66%{transform:translateX(-3px)}88%{transform:translateX(3px)}}
  .who .face{font-size:46px;line-height:1}
  .who .nm{font-weight:800;margin-top:10px;font-size:18px}
  .who .pts{margin-top:8px}
  .parent-btn{
    margin:22px auto 0;display:flex;align-items:center;justify-content:center;gap:10px;
    background:var(--ink);color:#fff;border-radius:16px;padding:15px 22px;font-weight:800;font-size:16px;
    box-shadow:var(--shadow);width:100%;max-width:340px;
  }
  .parent-btn:active{transform:scale(.98)}
  .lang-btn{background:#fff;border-radius:10px;padding:6px 14px;font-weight:900;font-size:13px;box-shadow:var(--shadow);color:var(--ink-soft);}
  .lang-btn:active{transform:scale(.96)}

  /* ---------- HEADER (child / parent) ---------- */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .back{background:#fff;border-radius:14px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow);flex:none;}
  .top .who-name{font-size:22px;font-weight:900;}
  .top .spacer{flex:1}

  .hero{
    border-radius:26px;padding:20px 22px;color:#fff;margin-bottom:18px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .hero .emoji{position:absolute;right:-6px;bottom:-18px;font-size:120px;opacity:.22;transform:rotate(-8deg)}
  .hero .label{font-weight:700;opacity:.9;font-size:14px}
  .hero .big{font-size:46px;font-weight:900;line-height:1.05;margin-top:2px;display:flex;align-items:center;gap:12px}
  .hero .big .c{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7d6,#ffd34d);box-shadow:inset 0 0 0 3px rgba(255,255,255,.55)}
  .hero .sub{margin-top:8px;font-weight:700;opacity:.92;font-size:14px}

  /* ---------- SECTIONS ---------- */
  .section-h{display:flex;align-items:center;gap:10px;margin:22px 4px 12px;}
  .section-h h3{font-size:16px;color:var(--ink)}
  .section-h .tag{font-size:12px;font-weight:800;color:var(--ink-soft);background:#fff;border:1px solid var(--line);padding:3px 9px;border-radius:999px}

  .task{
    background:var(--card);border-radius:18px;padding:14px 14px 14px 16px;margin-bottom:10px;
    display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
  }
  .task .meta{flex:1;min-width:0}
  .task .t{font-weight:800;font-size:16px}
  .task .f{font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:2px}
  .task .pts-badge{background:#FFF4D6;color:#a06d00;font-weight:900;border-radius:12px;padding:6px 11px;font-size:14px;white-space:nowrap}
  .do{
    background:var(--good);color:#fff;font-weight:900;border-radius:14px;padding:12px 16px;font-size:15px;white-space:nowrap;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);
  }
  .do:active{transform:translateY(1px)}
  .waiting,.done-chip,.status-chip{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:14px;padding:8px 12px;font-size:13px;font-weight:900;
    text-align:center;line-height:1.25;min-width:54px;max-width:76px;
  }
  .waiting{background:#FFF1DE;color:#b86a00}
  .done-chip{background:#E6F7EE;color:#1d8a55}
  .status-chip{background:var(--line);color:var(--ink-soft)}

  .empty{
    background:#fff;border:2px dashed var(--line);border-radius:18px;padding:26px 18px;text-align:center;
    color:var(--ink-soft);font-weight:700;
  }
  .empty .em{font-size:34px;display:block;margin-bottom:6px}

  /* ---------- STORE ---------- */
  .reward{
    background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:10px;
  }
  .store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.store-grid{grid-template-columns:1fr}}
  .reward .r-top{display:flex;align-items:center;gap:10px}
  .reward .r-emoji{font-size:30px}
  .reward .r-name{font-weight:800;font-size:16px;flex:1}
  .buy{background:var(--gold);color:#6b4a00;font-weight:900;border-radius:14px;padding:12px;font-size:15px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.10)}
  .buy.locked{background:#EFEADF;color:#9a937f}
  .buy:active{transform:translateY(1px)}

  /* ---------- PARENT NAV ---------- */
  .tabs{display:flex;gap:8px;background:#fff;padding:6px;border-radius:18px;box-shadow:var(--shadow);margin-bottom:18px;overflow:auto}
  .tab{flex:1;white-space:nowrap;text-align:center;padding:11px 10px;border-radius:13px;font-weight:800;color:var(--ink-soft);font-size:14px}
  .tab.active{background:var(--ink);color:#fff}
  .badge-n{display:inline-block;min-width:20px;padding:0 6px;height:20px;line-height:20px;background:var(--c1);color:#fff;border-radius:999px;font-size:12px;font-weight:900;margin-left:6px}

  /* ---------- PARENT CARDS ---------- */
  .card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px}
  .row .grow{flex:1;min-width:0}
  .muted{color:var(--ink-soft);font-weight:600;font-size:13px}
  .who-chip{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;padding:4px 10px;border-radius:999px;color:#fff}

  .approve-card .who-line{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .btn-line{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;text-align:center;border-radius:13px;padding:12px;font-weight:900;font-size:15px}
  .btn-yes{background:var(--good);color:#fff}
  .btn-no{background:#FCE9E9;color:#c0392b}
  .btn-ghost{background:#F3EFE6;color:var(--ink)}

  .add-btn{
    width:100%;background:var(--ink);color:#fff;border-radius:16px;padding:15px;font-weight:900;font-size:16px;
    box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .add-btn:active{transform:scale(.99)}

  .tpl-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .tpl{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 13px;font-weight:800;font-size:14px;box-shadow:0 4px 12px rgba(35,33,74,.05)}
  .tpl b{color:var(--gold-deep)}
  .tpl:active{transform:scale(.97)}

  .mini{display:flex;gap:6px;flex-wrap:wrap}
  .mini button{background:#F3EFE6;border-radius:10px;padding:8px 12px;font-weight:800;font-size:14px}
  .mini button:active{transform:scale(.96)}

  .item-actions{display:flex;gap:6px}
  .icon-btn{width:40px;height:40px;border-radius:12px;background:#F3EFE6;display:flex;align-items:center;justify-content:center;font-size:18px}
  .icon-btn:active{transform:scale(.95)}
  .drag-handle{width:40px;height:40px;border-radius:12px;background:#F3EFE6;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:grab;flex-shrink:0}
  .drag-lines{display:flex;flex-direction:column;gap:4px;pointer-events:none}
  .drag-lines b{display:block;width:18px;height:2.5px;background:var(--ink-soft);border-radius:2px}

  /* ---------- MODAL ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(35,33,74,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  @media(min-width:560px){.modal-bg{align-items:center}}
  .modal{
    background:#fff;border-radius:26px 26px 0 0;width:100%;max-width:520px;padding:22px 20px 26px;
    box-shadow:0 -10px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  }
  body.modal-open{position:fixed;left:0;right:0;width:100%;overflow:hidden;}
  @media(min-width:560px){.modal{border-radius:26px}}
  .modal h3{font-size:20px;margin-bottom:16px}
  label.fld{display:block;font-weight:800;font-size:13px;color:var(--ink-soft);margin:12px 2px 6px}
  input.in,select.in{
    width:100%;border:2px solid var(--line);border-radius:14px;padding:14px;font-size:16px;font-weight:700;
    color:var(--ink);background:#fff;font-family:inherit;
  }
  input.in:focus,select.in:focus{outline:none;border-color:var(--ink)}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg .opt{flex:1;min-width:120px;text-align:center;border:2px solid var(--line);border-radius:14px;padding:12px;font-weight:800;font-size:14px}
  .seg .opt.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .kid-pick{display:flex;gap:8px;flex-wrap:wrap}
  .kid-pick .opt{flex:1;min-width:90px;text-align:center;border:3px solid var(--line);border-radius:14px;padding:12px 8px;font-weight:800;font-size:14px}
  .kid-pick .opt.on{border-color:currentColor}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .toast{
    position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);opacity:0;
    background:var(--ink);color:#fff;font-weight:800;padding:13px 20px;border-radius:14px;z-index:80;
    box-shadow:var(--shadow);transition:all .25s ease;pointer-events:none;font-size:15px;text-align:center;max-width:90%;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hist-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .hist-row:last-child{border-bottom:none}
  .hist-row .h-pts{font-weight:900;white-space:nowrap}
  .footer-note{text-align:center;color:var(--ink-soft);font-size:12px;font-weight:600;margin-top:26px;line-height:1.5}

  /* ---------- TOGGLE SWITCH ---------- */
  .toggle-sw{
    width:50px;height:28px;border-radius:14px;background:#DDD;position:relative;
    transition:background .2s;flex:none;cursor:pointer;border:none;padding:0;
  }
  .toggle-sw.on{background:var(--good);}
  .toggle-sw::after{
    content:"";width:24px;height:24px;border-radius:12px;background:#fff;
    position:absolute;top:2px;left:2px;transition:transform .2s;
    box-shadow:0 1px 4px rgba(0,0,0,.25);pointer-events:none;
  }
  .toggle-sw.on::after{transform:translateX(22px);}
  .toggle-sw:active{opacity:.85}

  /* ---------- PERIOD BADGES ---------- */
  .period-badge{font-weight:800;font-size:12px;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .period-active{background:#E6F7EE;color:#1d8a55;}
  .period-inactive{background:#F3EFE6;color:var(--ink-soft);}
  .period-allday{background:#FFF4D6;color:#a06d00;}
  .danger-zone{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}

  /* ---------- EVENT ANIMATIONS ---------- */
  @keyframes ev-star-out{
    0%{transform:translate(-50%,-50%) scale(0.3);opacity:1}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1);opacity:0}
  }
  @keyframes ev-pts-float{
    0%{opacity:0;transform:translate(-50%,-50%)}
    15%{opacity:1;transform:translate(-50%,-65%)}
    72%{opacity:1;transform:translate(-50%,-95%)}
    100%{opacity:0;transform:translate(-50%,-120%)}
  }
  @keyframes ev-bomb-fall{
    0%{transform:translate(-50%,-300%) rotate(-15deg) scale(0.3);opacity:0}
    65%{transform:translate(-50%,-50%) rotate(5deg) scale(1.15);opacity:1}
    82%{transform:translate(-50%,-50%) rotate(-3deg) scale(0.92);opacity:1}
    100%{transform:translate(-50%,-50%) scale(0);opacity:0}
  }
  @keyframes ev-explode{
    0%{font-size:0;opacity:0}
    25%{font-size:110px;opacity:1}
    100%{font-size:170px;opacity:0}
  }
  @keyframes ev-flash{0%{opacity:0.6}100%{opacity:0}}
  @keyframes ev-pts-up-side{
    0%{opacity:0;transform:translateY(-50%)}
    12%{opacity:1;transform:translateY(-50%)}
    70%{opacity:1;transform:translateY(calc(-50% - 38px))}
    100%{opacity:0;transform:translateY(calc(-50% - 58px))}
  }
  @keyframes ev-pts-down-side{
    0%{opacity:0;transform:translateY(-50%)}
    12%{opacity:1;transform:translateY(-50%)}
    70%{opacity:1;transform:translateY(calc(-50% + 38px))}
    100%{opacity:0;transform:translateY(calc(-50% + 58px))}
  }
  @keyframes ev-hero-pulse{
    0%{transform:scale(1)}40%{transform:scale(1.06)}70%{transform:scale(0.97)}100%{transform:scale(1)}
  }
  .ev-tpl-card{border-left:4px solid #ddd}
  .ev-tpl-card.powerup{border-left-color:#2BB673}
  .ev-tpl-card.bomb{border-left-color:#E74C3C}
  @keyframes fadeInDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .parental-edit-panel{animation:fadeInDown 0.25s ease both}
  .task-skipped{opacity:.4}
</style>
</head>
<body>

<input type="file" id="restore-input" accept="application/json,.json" style="display:none">

}

/* ============ Outils de période ============ */
function pad(n){ return String(n).padStart(2,"0"); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function isoWeek(d){
  const x = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = x.getUTCDay() || 7;
  x.setUTCDate(x.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(x.getUTCFullYear(),0,1));
  const wk = Math.ceil((((x - yearStart)/86400000)+1)/7);
  return x.getUTCFullYear() + "-W" + pad(wk);
}
function periodKey(freq, d){
  d = d || new Date();
  if(freq==="once")    return "once";
  if(freq==="daily")   return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  if(freq==="weekly")  return isoWeek(d);
  if(freq==="monthly") return d.getFullYear()+"-"+pad(d.getMonth()+1);
  return "once";
}

/* ============ Logique ============ */
function child(id){ return state.children.find(c=>c.id===id); }
function reward(id){ return state.rewards.find(r=>r.id===id); }
function task(id){ return state.tasks.find(t=>t.id===id); }
function period(id){ return (state.periods||[]).find(p=>p.id===id); }
function taskPeriodName(tsk){
  if(!tsk.periodId || tsk.periodId==="allday") return t("allDayLabel");
  const p = period(tsk.periodId);
  return p ? p.name : t("allDayLabel");
}

/* ---- Missions extrêmes : helpers ---- */
const EXTREME_EMOJI = {solo:"🧍", competitive:"⚔️", collab:"🤝", all:"👨‍👩‍👧‍👦"};
function isExtreme(tsk){ return tsk && tsk.type === "extreme"; }
function taskChildIds(tsk){ return tsk.childIds ? tsk.childIds : (tsk.childId!=null ? [tsk.childId] : []); }
function extremeEmoji(tsk){ return EXTREME_EMOJI[tsk.extremeMode] || "⭐"; }
function alldayPeriodId(){ const p=(state.periods||[]).find(x=>x.isAllDay); return p?p.id:"allday"; }

/* statut par enfant, valable pour tâche normale OU extrême partagée */
function taskStatusFor(tsk, childId){
  const pk = periodKey(tsk.freq);
  if(state.skips && state.skips.some(x=>x.taskId===tsk.id && x.childId===childId && x.periodKey===pk)) return "skipped";
  const c = state.completions.find(x=>x.taskId===tsk.id && x.childId===childId && x.periodKey===pk);
  if(!c) return "open";
  return c.status==="approved" ? "done" : "pending";
}

/* mission extrême « fermée » pour la période courante (compétitif remporté / collab terminé) */
function extremeClosedKey(tsk){ return tsk.id + "|" + periodKey(tsk.freq); }
function isExtremeClosed(tsk){ return !!(state.extremeClosed && state.extremeClosed[extremeClosedKey(tsk)]); }
function closeExtreme(tsk){
  if(!state.extremeClosed) state.extremeClosed = {};
  state.extremeClosed[extremeClosedKey(tsk)] = true;
}

/* une mission extrême se débloque pour un enfant quand toutes ses tâches
   régulières de la période assignée (+ all-day si requis) sont APPROUVÉES */
function extremeUnlocked(tsk, childId){
  const alldayId = alldayPeriodId();
  const pid = tsk.periodId || alldayId;
  const gatingIds = new Set([pid]);
  if(tsk.allDayRequired) gatingIds.add(alldayId);
  const gating = state.tasks.filter(x =>
    !isExtreme(x) &&
    taskChildIds(x).includes(childId) &&
    gatingIds.has(x.periodId || alldayId)
  );
  if(gating.length === 0) return true; // rien à compléter → surplus disponible
  return gating.every(x => taskStatusFor(x, childId) === "done");
}

function taskStatus(t){
  const pk = periodKey(t.freq);
  const c = state.completions.find(x=>x.taskId===t.id && x.childId===t.childId && x.periodKey===pk);
  if(!c) return "open";
  return c.status==="approved" ? "done" : "pending";
}
function pendingCount(){
  const tasks = state.completions.filter(c=>{
    if(c.status !== "pending") return false;
    const tsk = task(c.taskId);
    if(tsk && isExtreme(tsk) && tsk.extremeMode === "all") return allModeReady(tsk);
    return true;
  }).length;
  const purchases = (state.purchases||[]).filter(p=>p.status==="pending").length;
  return tasks + purchases;
}

function markDone(taskId, childId){
  const t = task(taskId); if(!t) return;
  const cid = childId != null ? childId : t.childId;
  if(cid == null) return;
  const pk = periodKey(t.freq);
  const exists = state.completions.find(c=>c.taskId===t.id && c.childId===cid && c.periodKey===pk);
  if(exists) return;
  /* pts ajustés si une réduction de report a été appliquée */
  const cpKey = `${t.id}|${cid}`;
  const adjPts = (state.carryPenalties && state.carryPenalties[cpKey] != null)
    ? state.carryPenalties[cpKey] : null;
  state.completions.push({id:uid(), taskId:t.id, childId:cid, periodKey:pk, status:"pending",
    pts: adjPts, createdAt:Date.now()});
  save();
}
function approve(compId){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId);
  c.status = "approved"; c.approvedAt = Date.now();
  /* utilise les points ajustés stockés dans la complétion (carry penalty), sinon tsk.points */
  if(tsk){ const k = child(c.childId); if(k){ k.points += (c.pts != null ? c.pts : tsk.points); } }
  save();
}
function reject(compId){
  state.completions = state.completions.filter(x=>x.id!==compId);
  save();
}
/* Approbation d'une complétion de mission extrême partagée (compétitif / collabore) */
function approveExtremeComp(compId, finish){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId); if(!tsk) return;
  c.status = "approved"; c.approvedAt = Date.now();
  const k = child(c.childId); if(k){ k.points += (c.pts != null ? c.pts : tsk.points); }
  if(tsk.extremeMode === "competitive"){
    /* remporté : ferme pour tous, retire les autres complétions en attente */
    closeExtreme(tsk);
    const pk = periodKey(tsk.freq);
    state.completions = state.completions.filter(x =>
      !(x.taskId===tsk.id && x.periodKey===pk && x.id!==c.id && x.status!=="approved")
    );
  } else if(tsk.extremeMode === "collab" && finish){
    /* approuvé & terminé : ferme pour tous, mais garde les complétions déjà en attente */
    closeExtreme(tsk);
  }
  save();
}
/* Refus d'une mission extrême avec pénalité optionnelle (bombe) */
function rejectExtremeConfirm(compId, penalty){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId);
  const k = tsk ? child(c.childId) : null;
  state.completions = state.completions.filter(x=>x.id!==compId);
  if(tsk && k && penalty >= 1){
    applyEvent("bomb", tsk.title + " : " + t("notDoneSuffix"), penalty, [k.id]);
  } else {
    save();
  }
}
function buy(rewardId, childId){
  const r = reward(rewardId); const k = child(childId);
  if(!r||!k) return false;
  if(k.points < r.cost) return false;
  k.points -= r.cost;
  state.purchases.unshift({id:uid(), rewardId:r.id, childId:k.id, childName:k.name, title:r.title, emoji:r.emoji||"🎁", cost:r.cost, status:"pending", createdAt:Date.now()});
  save();
  return true;
}
function adjustPoints(childId, delta){
  const k = child(childId); if(!k) return;
  k.points = Math.max(0, k.points + delta);
  save();
}
function deleteChild(id){
  state.children = state.children.filter(c=>c.id!==id);
  /* retire l'enfant des missions partagées ; supprime la mission si plus aucun enfant */
  state.tasks.forEach(tk=>{ if(tk.childIds) tk.childIds = tk.childIds.filter(x=>x!==id); });
  state.tasks = state.tasks.filter(tk=> tk.childIds ? tk.childIds.length>0 : tk.childId!==id);
  state.completions = state.completions.filter(c=>c.childId!==id);
  state.purchases = state.purchases.filter(p=>p.childId!==id);
  save();
}

/* ============ Routeur de vue ============ */
let view = { name:"lock", childId:null, tab:"approbations" };
let rejectingComp = null; /* id de complétion en cours de refus avec pénalité */
function go(name, opts){ view = Object.assign({name}, opts||{}); render(); }

/* ============ Rendu ============ */
const app = () => document.getElementById("app");
function esc(s){ return String(s).replace(/[&<>"]/g, m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[m])); }
function coinPill(n){ return `<span class="coin"><span class="dot"></span>${n}</span>`; }
/* chip de statut : emoji sur ligne 1, texte sur ligne 2 */
function statusChip(cls, full){
  /* sépare le premier emoji/caractère non-texte du reste */
  const m = full.match(/^(\p{Emoji_Presentation}|\p{Emoji}️|[^ \w])\s*(.*)/u);
  if(m && m[2]) return `<span class="${cls}"><span style="font-size:16px;line-height:1">${m[1]}</span><span style="font-size:12px">${m[2]}</span></span>`;
  return `<span class="${cls}">${full}</span>`;
}

/* delta signé d'une notification (rétrocompat si delta absent) */
function notifDelta(n){ return n.delta !== undefined ? n.delta : ((n.type==="powerup"||n.type==="investment") ? n.points : -n.points); }

/* points à afficher sur l'écran d'accueil avant que l'enfant ait vu l'animation */
function lockDisplayPts(c){
  const unviewed = (state.notifications||[]).filter(n => n.childId === c.id && !n.viewedAt);
  const pending  = unviewed.reduce((s, n) => s + notifDelta(n), 0);
  return Math.max(0, c.points - pending);
}

function render(){
  document.documentElement.lang = state.lang || "fr";
  if(view.name==="lock")   return renderLock();
  if(view.name==="child")  return renderChild();
  if(view.name==="store")  return renderStore();
  if(view.name==="parent") return renderParent();
}

function renderRewardHistory(c){
  const now = Date.now(), H24 = 864e5;
  const items = (state.purchases||[]).filter(p => {
    if(!p.status) return false; /* old purchases without status */
    if(p.childId !== c.id) return false;
    if(p.status==="given"    && p.givenAt    && (now-p.givenAt)   >H24) return false;
    if(p.status==="refused"  && p.refusedAt  && (now-p.refusedAt) >H24) return false;
    return true;
  });
  if(items.length===0) return "";
  return items.map(p=>{
    let chip="", sub="", cancelBtn="";
    if(p.status==="pending"){
      chip=`<span class="tag" style="background:#FFF4D6;color:#a06d00;font-size:12px">${t("purchasePending")}</span>`;
      cancelBtn=`<button class="btn btn-ghost" style="font-size:12px;padding:5px 12px;margin-top:6px" data-action="cancel-purchase" data-id="${p.id}">${t("btnCancel")}</button>`;
    } else if(p.status==="approved"){
      chip=`<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:12px">${t("purchaseApproved")}</span>`;
      sub=`<div style="font-size:11px;font-weight:700;color:#1d8a55;margin-top:2px">${t("purchaseApprovedSub")}</div>`;
    } else if(p.status==="given"){
      chip=`<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:12px">${t("purchaseGiven")}</span>`;
    } else if(p.status==="refused"){
      chip=`<span class="tag" style="background:#FCE9E9;color:#c0392b;font-size:12px">${t("purchaseRefused")}</span>`;

function showRefundAnim(pts){
  const ptsEl = document.getElementById("pts-val");
  if(!ptsEl) return;
  const rect = ptsEl.getBoundingClientRect();

  badge.textContent = "+" + pts;

  setTimeout(()=>badge.remove(), 1600);

}

function cleanupPurchases(){
  const now=Date.now(), H24=864e5, before=(state.purchases||[]).length;
  state.purchases=(state.purchases||[]).filter(p=>{
    if(p.status==="given"   && p.givenAt   && (now-p.givenAt)  >H24) return false;
    if(p.status==="refused" && p.refusedAt && (now-p.refusedAt)>H24) return false;
    return true;
  });
  if((state.purchases||[]).length!==before) save();
}

function renderChild(){
  const c = child(view.childId);
  const myTasks = state.tasks.filter(tsk => taskChildIds(tsk).includes(c.id));

  /* --- notification lifecycle --- */
  const nowMs = Date.now();
  const THIRTY_MIN = 30 * 60 * 1000;
  const beforeLen = (state.notifications||[]).length;
  state.notifications = (state.notifications||[]).filter(n =>
    n.childId !== c.id || !n.viewedAt || (nowMs - n.viewedAt) < THIRTY_MIN
  );
  const myNotifs    = (state.notifications||[]).filter(n => n.childId === c.id);
  const newlyViewed = myNotifs.filter(n => !n.viewedAt);

  /* capturer displayPts AVANT de poser viewedAt : lockDisplayPts soustrait les deltas
     des notifications non vues, donnant la valeur "avant animation" correcte */
  const displayPts = lockDisplayPts(c);

  newlyViewed.forEach(n => { n.viewedAt = nowMs; });
  if(newlyViewed.length > 0 || state.notifications.length !== beforeLen) save();

  /* events panel between hero and boutique */
  const evPanel = myNotifs.length === 0 ? "" : `
    <div style="margin:0 0 10px;background:#fff;border-radius:18px;padding:14px 18px;box-shadow:var(--shadow)">
      <div style="font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${state.lang==="fr"?"Événements":"Events"}</div>
      ${myNotifs.map((n,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:7px 0${i<myNotifs.length-1?";border-bottom:1px solid var(--line)":""}">
          <span style="font-size:18px">${n.type==="powerup"?"⚡":n.type==="investment"?"💰":"💣"}</span>
          <div style="flex:1;font-weight:700;font-size:15px">${esc(n.title)}</div>
          <span style="font-weight:900;font-size:16px;color:${(n.type==="powerup"||n.type==="investment")?"#2BB673":"#E74C3C"}">${(n.type==="powerup"||n.type==="investment")?"+":"-"}${n.points}</span>
        </div>`).join("")}
    </div>`;

  const now = new Date();
  const nowStr = pad(now.getHours()) + ":" + pad(now.getMinutes());

  /* period status: past / current / upcoming */
  function pStatus(p){
    if(!p || p.isAllDay) return "current";
    if(nowStr < p.startTime) return "upcoming";
    if(nowStr > p.endTime)   return "past";
    return "current";
  }

  /* sorted display periods */
  const allPeriods  = state.periods || [];
  const alldayP     = allPeriods.find(p => p.isAllDay);
  const otherPs     = allPeriods
    .filter(p => !p.isAllDay && p.active)
    .sort((a, b) => a.startTime.localeCompare(b.startTime));
  const displayPeriods = [alldayP, ...otherPs].filter(Boolean);

  /* for carry-over: find period covering nowStr, else allday */
  function carryTargetId(){
    const hit = otherPs.find(p => nowStr >= p.startTime && nowStr <= p.endTime);
    return hit ? hit.id : (alldayP ? alldayP.id : null);
  }

  /* build display map: periodId → [{tsk, carried, greyed}] */
  const displayMap = {};
  displayPeriods.forEach(p => { displayMap[p.id] = []; });

  function addToMap(pid, entry){
    if(pid && displayMap[pid] !== undefined) displayMap[pid].push(entry);
    else if(alldayP) displayMap[alldayP.id].push(entry);
  }

  myTasks.forEach(tsk => {
    const st  = taskStatusFor(tsk, c.id);
    if(tsk.freq === "once" && st === "done") return;
    const ex = isExtreme(tsk);

    const pid = tsk.periodId || (alldayP ? alldayP.id : null);
    const p   = allPeriods.find(x => x.id === pid);
    const status = pStatus(p);

    if(status !== "past" || !p || p.isAllDay){
      addToMap(pid, {tsk, carried:false, greyed:false, ex});
    } else if(tsk.carryOn && st === "open"){
      /* carry to period covering current time */
      addToMap(carryTargetId(), {tsk, carried:true, greyed:false, ex});
    } else {
      /* stay in past period — greyed */
      addToMap(pid, {tsk, carried:false, greyed:true, ex});
    }
  });

  /* render */
  let sections = "";
  let anyVisible = false;

  displayPeriods.forEach(p => {
    const items = displayMap[p.id] || [];
    if(items.length === 0) return;
    anyVisible = true;

    const status   = pStatus(p);
    const isPast   = status === "past";
    const isCurrent= status === "current";
    const pName    = p.isAllDay ? t("allDayLabel") : p.name;
    const timeLabel= p.isAllDay ? t("allDayTime") : `${p.startTime} – ${p.endTime}`;

    const hdrMargin= isPast ? "margin:14px 4px 8px" : "margin:22px 4px 12px";
    const h3Style  = isPast ? "font-size:13px;color:var(--ink-soft)" : "font-size:16px;color:var(--ink)";
    const tagStyle = isPast ? "opacity:.5;font-size:11px" : "";
    const badge    = isPast
      ? `<span class="tag" style="background:var(--line);color:var(--ink-soft);font-size:11px">✓ ${t("periodPast")}</span>`
      : isCurrent
        ? `<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:11px">● ${t("periodCurrent")}</span>`
        : `<span class="tag" style="background:#FFF4D6;color:#a06d00;font-size:11px">⏰ ${t("periodUpcoming")}</span>`;

    sections += `
      <div class="section-h" style="${hdrMargin}">
        <span style="font-size:${isPast?"18px":"22px"};line-height:1">${esc(p.emoji||"")}</span>
        <h3 style="${h3Style}">${esc(pName)}</h3>
        <span class="tag" style="${tagStyle}">${timeLabel}</span>
        ${badge}
      </div>`;

    /* missions extrêmes (surplus) en dernier dans la période */
    items.sort((a,b)=> (a.ex?1:0) - (b.ex?1:0));

    items.forEach(({tsk, carried, greyed, ex}) => {
      const st = taskStatusFor(tsk, c.id);

      if(ex){
        const unlocked = extremeUnlocked(tsk, c.id);
        const closed   = isExtremeClosed(tsk);
        const modeEmoji= extremeEmoji(tsk);
        let action, locked=false;
        if(st === "done"){
          action = statusChip("done-chip", t("statusDone"));
        } else if(st === "pending"){
          action = statusChip("waiting", tsk.extremeMode==="all"
            ? (allModeReady(tsk) ? t("statusWaitApproval") : t("statusWaitOthers"))
            : t("statusPending"));
        } else if(closed){
          action = statusChip("status-chip", t("extremeWon"));
          locked = true;
        } else if(!unlocked){
          action = `<span style="font-size:16px;padding:6px 10px;background:var(--line);border-radius:10px">🔒</span>`;
          locked = true;
        } else {
          action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        }
        const wrapStyle = locked
          ? "opacity:.55;border:2px dashed var(--line);border-radius:16px"
          : "border:2px solid #FFCF5C;background:linear-gradient(135deg,#FFF9E9,#FFF1CC);border-radius:16px";
        /* compteur X/N pour mode Tous */
        let allCounter = "";
        if(tsk.extremeMode === "all"){
          const pk = periodKey(tsk.freq);
          const ids = taskChildIds(tsk);
          const done = ids.filter(cid =>
            state.completions.some(x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===pk)
          ).length;
          allCounter = ` · <b>${done}/${ids.length}</b>`;
        }
        const subLine = (!unlocked && !closed && st==="open")
          ? `${t("extremeSurplus")}${allCounter} · ${t("extremeLocked")}`
          : `${t("extremeSurplus")}${allCounter}`;
        sections += `
          <div class="task" style="${wrapStyle}">
            <span class="pts-badge" style="background:#FFB020;color:#4a2d00">+${tsk.points}</span>
            <div class="meta">
              <div class="t">${modeEmoji} ${esc(tsk.title)}</div>
              <div class="f" style="font-size:12px;color:#a06d00;font-weight:800">${subLine}</div>
            </div>
            ${action}
          </div>`;
        return;
      }

      let action;
      if(view.childEditMode && st === "skipped"){
        action = `<button class="do" style="background:#ddd;color:#888;font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skipped")}</button>`;
      } else if(view.childEditMode && st === "open" && !greyed){
        action = `<button class="do" style="background:var(--line);color:var(--ink-soft);font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skip")}</button>`;
      } else if(st === "skipped"){
        action = statusChip("status-chip", `✗ ${t("skipped")}`);
      } else if(greyed && st === "open"){
        action = `<span style="font-size:12px;font-weight:700;color:var(--ink-soft);padding:6px 10px;background:var(--line);border-radius:10px">—</span>`;
      } else {
        action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        if(st === "pending") action = statusChip("waiting",   t("statusPending"));
        if(st === "done")    action = statusChip("done-chip", t("statusDone"));
      }

      const wrapStyle = [
        (greyed || st === "skipped") ? "opacity:.4" : "",
        carried ? "border-left:3px solid var(--wait);padding-left:13px" : "",
      ].filter(Boolean).join(";");

      /* badge avec réduction de report éventuelle */
      const cpKey2 = `${tsk.id}|${c.id}`;
      const adjPts2 = (state.carryPenalties && state.carryPenalties[cpKey2] != null)
        ? state.carryPenalties[cpKey2] : null;
      const ptsBadge = adjPts2 != null
        ? `<span style="display:flex;flex-direction:column;align-items:center;gap:1px">
             <span class="pts-badge" style="font-size:11px;opacity:.55;text-decoration:line-through;padding:3px 8px">+${tsk.points}</span>
             <span class="pts-badge" style="background:#FFDAD6;color:#c0392b;font-size:14px">+${adjPts2}</span>
           </span>`
        : `<span class="pts-badge" style="font-size:${greyed?"12px":"14px"}">${greyed?"":"+"}${tsk.points}</span>`;

      sections += `
        <div class="task" id="tc-${tsk.id}" style="${wrapStyle}">
          ${ptsBadge}
          <div class="meta">
            <div class="t" style="${greyed?"font-size:14px":""}">${esc(tsk.title)}</div>
            ${carried ? `<div class="f" style="color:var(--wait);font-size:12px">↩ ${t("carriedOver")}</div>` : ""}
          </div>
          ${action}
        </div>`;
    });
  });

  if(!anyVisible){
    sections = `<div class="empty"><span class="em">🗒️</span>${t("noTasks")}</div>`;
  }

  app().innerHTML = `
    <div class="top">
      <button class="back" data-action="lock">‹</button>
      <div class="who-name" style="color:${c.color};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.emoji)} ${esc(c.name)}</div>
      ${view.childEditMode ? `
        <button class="btn btn-yes" style="font-size:13px;padding:8px 14px;flex-shrink:0" data-action="child-edit-done">${t("parentalDone")}</button>
      ` : `
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <button class="icon-btn" style="font-size:18px" data-action="child-edit-self" data-id="${c.id}">✏️</button>
          <button class="icon-btn" style="font-size:18px" data-action="child-edit-gear" data-id="${c.id}">⚙️</button>
        </div>
      `}
    </div>
    <div class="hero" style="background:linear-gradient(135deg, ${c.color}, ${shade(c.color,-18)})">
      <span class="emoji">${esc(c.emoji)}</span>
      <div class="label">${t("myPoints")}</div>
      <div class="big"><span class="c"></span><span id="pts-val">${displayPts}</span></div>
      <div class="sub">${t("heroSub")}</div>
    </div>
    ${view.childEditMode ? `
      <div class="parental-edit-panel" style="margin-bottom:10px">
        <button class="add-btn" data-action="add-task-child" data-id="${c.id}">${t("addTask")}</button>
      </div>
    ` : ""}
    <button class="add-btn" data-action="open-store" data-id="${c.id}">${t("shopBtn")}</button>
    <div id="reward-hist-${c.id}">${renderRewardHistory(c)}</div>
    ${evPanel}
    ${sections}
  `;

  /* play animation then update the counter display */
  let runningPts = displayPts;
  newlyViewed.forEach((notif, i) => {
    const startAt  = 400 + i * 2900;
    /* powerup badge: delay 0.15s + 1.8s = ~2s; bomb badge: delay 1.15s + 1.8s = ~3s */
    const updateAt = startAt + ((notif.type==="powerup"||notif.type==="investment") ? 1550 : 2550);

    setTimeout(() => {
      if(notif.type==="powerup"){ showPowerUpAnim(c.color, notif.points); playPowerUpSound(); }
      else if(notif.type==="investment"){ showPowerUpAnim(c.color, notif.points); playInvestmentSound(); }
      else { showBombAnim(notif.points); playBombSound(); }
    }, startAt);

    setTimeout(() => {
      runningPts = Math.max(0, runningPts + notifDelta(notif));
      const pv = document.getElementById("pts-val");
      if(pv){
        pv.style.transition = "transform .25s ease";
        pv.style.transform  = "scale(1.3)";
        pv.textContent = runningPts;
        setTimeout(() => { pv.style.transform = "scale(1)"; }, 220);
      }
    }, updateAt);
  });
}

function renderParent(){
  const tabs = [
    {id:"approbations", label:t("tabApprove")},
    {id:"evenements",   label:t("tabEvents")},
    {id:"taches",       label:t("tabTasks")},
    {id:"periodes",     label:t("tabPeriods")},

  const pk = periodKey(tsk.freq);
  const ids = taskChildIds(tsk);
  return ids.length>0 && ids.every(cid =>
    state.completions.some(x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===pk));

function setupChildDrag(){
  const pb = document.getElementById("parent-body");
  if(!pb) return;
  let D = null;

  pb.querySelectorAll(".drag-handle").forEach(handle => {
    handle.addEventListener("touchstart", e => {
      e.preventDefault();
      const card = handle.closest(".child-card");
      const allCards = [...pb.querySelectorAll(".child-card")];
      const idx = allCards.indexOf(card);
      const rects = allCards.map(c => c.getBoundingClientRect());
      const cardH = rects[idx].height;
      const gap = rects.length > 1
        ? (rects.length > idx+1 ? rects[idx+1].top : rects[idx-1].top + rects[idx-1].height) - rects[idx].top
        : cardH + 12;

      card.style.transition = "none";
      card.style.position = "relative";
      card.style.zIndex = "10";
      card.style.boxShadow = "0 8px 28px rgba(0,0,0,.16)";
      card.style.transform = "scale(1.02)";

      D = { card, allCards, idx, currentIdx:idx,
            startY:e.touches[0].clientY, rects, cardH, gap };
    }, {passive:false});

    handle.addEventListener("touchmove", e => {
      if(!D) return;
      e.preventDefault();
      const dy = e.touches[0].clientY - D.startY;
      D.card.style.transform = `scale(1.02) translateY(${dy}px)`;

      /* find closest card midpoint */
      const fingerY = D.rects[D.idx].top + dy + D.cardH / 2;
      let newIdx = D.idx;
      let minDist = Infinity;
      D.rects.forEach((r, i) => {
        const dist = Math.abs(fingerY - (r.top + r.height / 2));
        if(dist < minDist){ minDist = dist; newIdx = i; }
      });

      /* shift other cards to show insertion point */
      D.allCards.forEach((c, i) => {
        if(c === D.card) return;
        c.style.transition = "transform .15s ease";
        if(D.idx < newIdx && i > D.idx && i <= newIdx){
          c.style.transform = `translateY(-${D.gap}px)`;
        } else if(D.idx > newIdx && i >= newIdx && i < D.idx){
          c.style.transform = `translateY(${D.gap}px)`;
        } else {
          c.style.transform = "";
        }
      });
      D.currentIdx = newIdx;
    }, {passive:false});

    const onEnd = () => {
      if(!D) return;
      D.allCards.forEach(c => {
        c.style.transform = "";
        c.style.transition = "";
        c.style.zIndex = "";
        c.style.position = "";
        c.style.boxShadow = "";
      });
      if(D.currentIdx !== D.idx){
        const arr = [...state.children];
        const [moved] = arr.splice(D.idx, 1);
        arr.splice(D.currentIdx, 0, moved);
        state.children = arr;
        save();
        pb.innerHTML = parentChildren();
        setupChildDrag();
      }
      D = null;
    };
    handle.addEventListener("touchend", onEnd);
    handle.addEventListener("touchcancel", onEnd);
  });
}

function fmtDate(ts){
  if(!ts) return null;
  const d = new Date(ts);
  const jours = state.lang==="en"
    ? ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"]
    : ["dim.","lun.","mar.","mer.","jeu.","ven.","sam."];
  return jours[d.getDay()]+" "+pad(d.getDate())+"/"+pad(d.getMonth()+1)+" "+(state.lang==="en"?"at":"à")+" "+pad(d.getHours())+":"+pad(d.getMinutes());
}

function applyEvent(type, title, points, childIds){
  if(!state.notifications) state.notifications = [];
  const targets = childIds.length===0 ? state.children
    : state.children.filter(c=>childIds.includes(c.id));
  targets.forEach(c=>{
    const raw   = (type==="powerup"||type==="investment") ? Math.abs(points) : -Math.abs(points);
    const after = Math.max(0, c.points + raw);
    const delta = after - c.points; /* actual change (may be 0 if already at floor) */
    c.points = after;
    state.notifications.push({id:uid(), childId:c.id, type, points:Math.abs(points), delta, title, createdAt:Date.now()});
  });
  save();
}

/* ---- Sons Web Audio ---- */
function playPowerUpSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [[659,0],[784,.12],[1319,.24],[1047,.36],[1175,.48],[1568,.60]].forEach(([f,dt])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="square"; o.frequency.value=f;
      g.gain.setValueAtTime(0.12, ctx.currentTime+dt);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dt+0.1);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+dt); o.stop(ctx.currentTime+dt+0.13);
    });
  }catch(e){}
}
function playBombSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.type="sine";
    o.frequency.setValueAtTime(1400, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ctx.currentTime+0.75);
    g.gain.setValueAtTime(0.18, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.75);
    o.connect(g); g.connect(ctx.destination);
    o.start(ctx.currentTime); o.stop(ctx.currentTime+0.75);
    const buf=ctx.createBuffer(1,Math.ceil(ctx.sampleRate*0.4),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.08));
    const src=ctx.createBufferSource(); src.buffer=buf;
    const eg=ctx.createGain();
    eg.gain.setValueAtTime(0.5, ctx.currentTime+0.72);
    eg.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+1.1);
    src.connect(eg); eg.connect(ctx.destination);
    src.start(ctx.currentTime+0.72); src.stop(ctx.currentTime+1.1);
  }catch(e){}
}

function playInvestmentSound(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    /* montée de pièces : do mi sol do' */
    [[523,0,0.07],[659,0.08,0.07],[784,0.16,0.07],[1047,0.24,0.12]].forEach(([f,dt,dur])=>{
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.type="triangle"; o.frequency.value=f;
      g.gain.setValueAtTime(0.18, ctx.currentTime+dt);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dt+dur);
      o.connect(g); g.connect(ctx.destination);
      o.start(ctx.currentTime+dt); o.stop(ctx.currentTime+dt+dur+0.01);
    });
    /* ching final */
    const o2=ctx.createOscillator(), g2=ctx.createGain();
    o2.type="sine"; o2.frequency.value=3136;
    g2.gain.setValueAtTime(0.14, ctx.currentTime+0.38);
    g2.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+0.38+0.7);
    o2.connect(g2); g2.connect(ctx.destination);
    o2.start(ctx.currentTime+0.38); o2.stop(ctx.currentTime+1.1);
    /* shimmer métallique */
    const buf=ctx.createBuffer(1,Math.floor(ctx.sampleRate*0.18),ctx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.025));
    const src=ctx.createBufferSource();
    const bpf=ctx.createBiquadFilter(); bpf.type="bandpass"; bpf.frequency.value=9000; bpf.Q.value=3;
    const gn=ctx.createGain(); gn.gain.setValueAtTime(0.09,ctx.currentTime+0.37);
    src.buffer=buf; src.connect(bpf); bpf.connect(gn); gn.connect(ctx.destination);
    src.start(ctx.currentTime+0.37);
  }catch(e){}
}

/* ============ Couleur : assombrir un hex ============ */
function shade(hex, percent){
  const n = parseInt(hex.slice(1),16);
  let r=(n>>16)&255, g=(n>>8)&255, b=n&255;
  r=Math.max(0,Math.min(255,Math.round(r+(r*percent/100))));
  g=Math.max(0,Math.min(255,Math.round(g+(g*percent/100))));
  b=Math.max(0,Math.min(255,Math.round(b+(b*percent/100))));
  return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}

/* ============ Modale ============ */
let modalScrollY = 0;
function lockBodyScroll(){
  if(document.body.classList.contains("modal-open")) return; /* déjà verrouillé (re-render du même modal) */
  modalScrollY = window.scrollY || window.pageYOffset || 0;
  document.body.style.top = `-${modalScrollY}px`;
  document.body.classList.add("modal-open");
}
function unlockBodyScroll(){
  if(!document.body.classList.contains("modal-open")) return;
  document.body.classList.remove("modal-open");
  document.body.style.top = "";
  window.scrollTo(0, modalScrollY);
}
function closeModal(){ document.getElementById("modal-root").innerHTML=""; unlockBodyScroll(); }
function openModal(html){
  lockBodyScroll();
  document.getElementById("modal-root").innerHTML = `<div class="modal-bg" data-action="modal-bg"><div class="modal">${html}</div></div>`;
}

/* ============ Sauvegarde / Restauration ============ */
function exportBackup(){
  state.lastBackupAt = Date.now();
  save();
  const d = new Date();
  const filename = "missions-sauvegarde-"+d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate())+".json";
  const blob = new Blob([JSON.stringify(state, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url), 2000);
  toast(t("toastBackupDone"));
  render();
}
function handleRestoreFile(ev){
  const file = ev.target.files && ev.target.files[0];
  ev.target.value = "";
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    let data;
    try{ data = JSON.parse(e.target.result); }
    catch(err){ toast(t("toastInvalidBackup")); return; }
    if(!data || !Array.isArray(data.children) || !Array.isArray(data.tasks) || !Array.isArray(data.rewards)){
      toast(t("toastInvalidBackup")); return;
    }
    if(confirm(t("confirmRestore"))){
      state = data;
      if(!state.lang) state.lang = "fr";
      save();
      go("lock");
      toast(t("toastRestored"));
    }
  };
  reader.readAsText(file);
}
document.getElementById("restore-input").addEventListener("change", handleRestoreFile);

/* ============ Gestion des clics ============ */
document.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const a = el.dataset.action;
  const id = el.dataset.id;

  switch(a){
    /* langue */
    case "refresh-app": location.reload(true); break;
    case "toggle-lang":
      state.lang = state.lang==="fr" ? "en" : "fr"; save(); render(); break;
    case "set-lang":
      state.lang = el.dataset.lang; save(); render(); break;

    /* navigation accueil */
    case "open-child": go("child",{childId:id}); break;
    case "open-store": case "open-store2": go("store",{childId:id}); break;
    case "lock": go("lock"); break;

    /* enfant */
    case "do-task":
      markDone(id, view.childId);
      toast(t("toastSent"));
      render();
      break;
    case "buy": {
      const r = reward(id); const k = child(el.dataset.child);
      if(k.points < r.cost){ toast(t("toastNotEnoughPts")); break; }
      if(confirm(t("confirmBuy",{title:r.title,cost:r.cost}))){
        buy(id, el.dataset.child);
        toast(t("toastBought"));
        render();
      }
      break;
    }

    /* espace parent (avec code) */
    case "open-parent":
      if(state.parentPin){ pinPrompt("enter"); }
      else { go("parent",{tab:"approbations"}); }
      break;
    case "check-pin": {
      const v=(document.getElementById("pin-in")||{}).value||"";
      if(v===state.parentPin){ closeModal(); go("parent",{tab:"approbations"}); }
      else { toast(t("toastWrongPin")); }
      break;
    }
    case "ptab": {
      const newTab = el.dataset.tab;
      if(newTab === view.tab) break;
      view.tab = newTab;
      /* update tab active state in-place */
      document.querySelectorAll("[data-action='ptab']").forEach(btn=>{
        btn.classList.toggle("active", btn.dataset.tab === newTab);
      });
      /* update body only — no scroll reset */
      let body = "";
      if(newTab==="approbations") body = parentApprovals();
      if(newTab==="taches")       body = parentTasks();
      if(newTab==="evenements")   body = parentEvents();
      if(newTab==="periodes")     body = parentPeriods();
      if(newTab==="boutique")     body = parentRewards();
      if(newTab==="enfants")        body = parentChildren();
      if(newTab==="investissement") body = parentInvestissement();
      if(newTab==="reglages")       body = parentSettings();
      const pb = document.getElementById("parent-body");
      if(pb) pb.innerHTML = body;
      if(newTab === "enfants") setTimeout(setupChildDrag, 0);
      break;
    }

    /* achats boutique */
    case "cancel-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "cancelled";
        const k = child(p.childId);
        if(k){ k.points = (k.points||0) + p.cost; showRefundAnim(p.cost); }
        state.purchases = state.purchases.filter(x=>x.id!==id);
        save(); render();
      }
      break;
    }
    case "approve-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "approved"; p.approvedAt = Date.now();
        save(); refreshParentBody();
        /* also refresh child history if visible */
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const k=child(p.childId); if(k) hist.innerHTML=renderRewardHistory(k); }
      }
      break;
    }
    case "refuse-purchase": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="pending"){
        p.status = "refused"; p.refusedAt = Date.now();
        const k = child(p.childId);
        if(k){ k.points = (k.points||0) + p.cost; }
        save(); refreshParentBody();
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const kk=child(p.childId); if(kk) hist.innerHTML=renderRewardHistory(kk); }
      }
      break;
    }
    case "mark-given": {
      const p = (state.purchases||[]).find(x=>x.id===id);
      if(p && p.status==="approved"){
        p.status = "given"; p.givenAt = Date.now();
        save(); refreshParentBody();
        const hist = document.getElementById("reward-hist-"+p.childId);
        if(hist){ const k=child(p.childId); if(k) hist.innerHTML=renderRewardHistory(k); }
      }
      break;
    }

    /* validations */
    case "approve": approve(id); toast(t("toastApproved")); render(); break;
    case "reject":  reject(id);  toast(t("toastRejected")); render(); break;
    case "appr-ext-keep":   approveExtremeComp(id, false); toast(t("toastApproved")); render(); break;
    case "appr-ext-finish": approveExtremeComp(id, true);  toast(t("toastApproved")); render(); break;
    case "rej-ext-start":   rejectingComp = id;   refreshParentBody(); break;
    case "rej-ext-cancel":  rejectingComp = null; refreshParentBody(); break;
    case "rej-ext-confirm": {
      const inp = document.getElementById("rej-pen-"+id);
      const pen = inp ? (parseInt(inp.value,10)||0) : 0;
      rejectingComp = null;
      rejectExtremeConfirm(id, pen);
      toast(t("toastRejected")); render(); break;
    }

    /* missions */
    case "new-task": taskForm(null); break;
    case "edit-task": taskForm(task(id)); break;
    case "del-task":
      if(confirm(t("confirmDelTask"))){
        state.tasks = state.tasks.filter(tsk=>tsk.id!==id);
        state.completions = state.completions.filter(c=>c.taskId!==id);
        save(); render();
      }
      break;
    case "tpl":
      formState = {
        id:null, type:"mission", extremeMode:"solo", allDayRequired:false,
        title:el.dataset.title, points:parseInt(el.dataset.points,10), freq:"daily",
        childIds:state.children[0]?[state.children[0].id]:[],
        periodId:"allday", carryOn:false, carryOnPenalty:0, incompletePenalty:0,
      };
      drawTaskForm();
      break;
    case "pick-task-type": captureTaskForm(); formState.type=el.dataset.type; drawTaskForm(); break;
    case "pick-extreme-mode": captureTaskForm(); formState.extremeMode=el.dataset.mode; drawTaskForm(); break;
    case "pick-allday-req": captureTaskForm(); formState.allDayRequired=(el.dataset.v==="true"); drawTaskForm(); break;
    case "pick-kid": {
      if(formState.id) break;
      captureTaskForm();
      const arr=[...(formState.childIds||[])];
      const idx=arr.indexOf(id);
      if(idx===-1){ arr.push(id); } else if(arr.length>1){ arr.splice(idx,1); }
      formState.childIds=arr; drawTaskForm(); break;
    }
    case "pick-freq": captureTaskForm(); formState.freq=el.dataset.f; drawTaskForm(); break;
    case "pick-carry-on": {
      const newVal = el.dataset.v === "true";
      formState.carryOn = newVal;
      document.querySelectorAll("[data-action='pick-carry-on']").forEach(btn => {
        btn.classList.toggle("on", btn.dataset.v === String(newVal));
      });
      const sec = document.getElementById("carry-penalty-section");
      if(sec) {
        sec.style.transition = "max-height .75s ease, opacity .75s ease";
        sec.style.maxHeight = newVal ? "150px" : "0";
        sec.style.opacity = newVal ? "1" : "0";
      }
      break;
    }
    case "save-task": {
      const title=(document.getElementById("f-title").value||"").trim();
      const points=Math.max(1, parseInt(document.getElementById("f-points").value,10)||1);
      if(!title){ toast(t("toastNeedTaskName")); break; }
      const periodId=(document.getElementById("f-period")||{}).value||"allday";
      const carryOn=formState.carryOn;
      const carryOnPenalty=carryOn?(parseInt(((document.getElementById("f-carry-penalty")||{}).value||"0"),10)||0):0;
      const incompletePenalty=parseInt(((document.getElementById("f-incomplete-penalty")||{}).value||"0"),10)||0;
      const isExtremeT = formState.type==="extreme";
      const extremeMode = isExtremeT ? formState.extremeMode : undefined;
      const allDayRequired = isExtremeT ? !!formState.allDayRequired : false;
      const isShared = isExtremeT && ["competitive","collab","all"].includes(formState.extremeMode);
      if(formState.id){
        const tsk=task(formState.id);
        tsk.title=title; tsk.points=points; tsk.freq=formState.freq; tsk.type=formState.type;
        tsk.extremeMode=extremeMode; tsk.allDayRequired=allDayRequired;
        tsk.periodId=periodId; tsk.carryOn=carryOn; tsk.carryOnPenalty=carryOnPenalty; tsk.incompletePenalty=incompletePenalty;
      } else if(isShared){
        state.tasks.push({
          id:uid(), type:"extreme", extremeMode, allDayRequired,
          title, points, freq:formState.freq, childIds:[...(formState.childIds||[])],
          periodId, carryOn, carryOnPenalty, incompletePenalty, createdAt:Date.now(),
        });
      } else {
        (formState.childIds||[]).forEach(cid=>{
          state.tasks.push({
            id:uid(), type:formState.type, extremeMode, allDayRequired,
            title, points, freq:formState.freq, childId:cid,
            periodId, carryOn, carryOnPenalty, incompletePenalty, createdAt:Date.now(),
          });
        });
      }
      save(); closeModal(); render(); toast(t("toastTaskSaved")); break;
    }

    /* récompenses */
    case "new-reward": rewardForm(null); break;
    case "edit-reward": rewardForm(reward(id)); break;
    case "del-reward":
      if(confirm(t("confirmDelReward"))){
        state.rewards = state.rewards.filter(r=>r.id!==id); save(); render();
      }
      break;
    case "save-reward": {
      const title=(document.getElementById("r-title").value||"").trim();
      const cost=Math.max(1, parseInt(document.getElementById("r-cost").value,10)||1);
      const emoji=(document.getElementById("r-emoji").value||"🎁").trim()||"🎁";
      if(!title){ toast(t("toastNeedRewardName")); break; }
      if(formState.id){
        const r=reward(formState.id); r.title=title; r.cost=cost; r.emoji=emoji;
      } else {
        state.rewards.push({id:uid(), title, cost, emoji});
      }
      save(); closeModal(); render(); toast(t("toastRewardSaved"));
      break;
    }

    /* événements */
    case "new-event": newEventForm(); break;
    case "pick-ev-type": {
      const ti=document.getElementById("ev-title"), pi=document.getElementById("ev-points");
      if(ti) eventFormState.title=ti.value;
      if(pi) eventFormState.points=Math.max(1,Math.abs(parseInt(pi.value)||5));
      eventFormState.type=el.dataset.v;
      drawEventForm(); break;
    }
    case "pick-ev-kid": {
      const kid=el.dataset.id;
      if(kid==="all"){ eventFormState.childIds=[]; }
      else {
        const idx=eventFormState.childIds.indexOf(kid);
        if(idx>=0) eventFormState.childIds.splice(idx,1);
        else eventFormState.childIds.push(kid);
        if(eventFormState.childIds.length===state.children.length) eventFormState.childIds=[];
      }
      document.querySelectorAll("[data-action='pick-ev-kid']").forEach(btn=>{
        const isAll=btn.dataset.id==="all";
        btn.classList.toggle("on", isAll ? eventFormState.childIds.length===0 : eventFormState.childIds.includes(btn.dataset.id));
      });
      break;
    }
    case "pick-ev-save-tpl": {
      eventFormState.saveAsTemplate=!eventFormState.saveAsTemplate;
      el.classList.toggle("on", eventFormState.saveAsTemplate);
      break;
    }
    case "apply-event": {
      const title=(document.getElementById("ev-title").value||"").trim();
      const points=Math.max(1,Math.abs(parseInt((document.getElementById("ev-points")||{}).value)||0));
      if(!title){ toast(t("toastNeedTaskName")); break; }
      if(eventFormState.saveAsTemplate){
        if(!state.eventTemplates) state.eventTemplates=[];
        state.eventTemplates.push({id:uid(), type:eventFormState.type, title, points, childIds:[]});
      }
      applyEvent(eventFormState.type, title, points, eventFormState.childIds);
      closeModal();
      const pb=document.getElementById("parent-body");
      if(pb) pb.innerHTML=parentEvents();
      toast(t(eventFormState.type==="powerup"?"toastPowerUpApplied":"toastBombApplied"));
      break;
    }
    case "edit-event-tpl": {
      const tpl=(state.eventTemplates||[]).find(x=>x.id===id); if(!tpl) break;
      eventFormState={editId:id, type:tpl.type, title:tpl.title, points:tpl.points, childIds:[...(tpl.childIds||[])], saveAsTemplate:false};
      drawEventForm(); break;
    }
    case "save-event-tpl": {
      const title=(document.getElementById("ev-title").value||"").trim();
      const points=Math.max(1,Math.abs(parseInt((document.getElementById("ev-points")||{}).value)||1));
      if(!title){ toast(t("toastNeedTaskName")); break; }
      const tpl=(state.eventTemplates||[]).find(x=>x.id===eventFormState.editId);
      if(tpl){ tpl.type=eventFormState.type; tpl.title=title; tpl.points=points; }
      if(evLive[eventFormState.editId]) evLive[eventFormState.editId].pts=points;
      save(); closeModal();
      const pb2=document.getElementById("parent-body");
      if(pb2) pb2.innerHTML=parentEvents();
      toast(t("toastTaskSaved")); break;
    }
    case "ev-pts-up": {
      const tpl=(state.eventTemplates||[]).find(x=>x.id===id); if(!tpl) break;
      if(!evLive[id]) evLive[id]={pts:tpl.points, childIds:[]};
      evLive[id].pts++;
      const disp=document.getElementById("ev-pts-"+id);
      if(disp) disp.textContent=evLive[id].pts;
      break;
    }
    case "ev-pts-down": {
      const tpl=(state.eventTemplates||[]).find(x=>x.id===id); if(!tpl) break;
      if(!evLive[id]) evLive[id]={pts:tpl.points, childIds:[]};
      evLive[id].pts=Math.max(1, evLive[id].pts-1);
      const disp2=document.getElementById("ev-pts-"+id);
      if(disp2) disp2.textContent=evLive[id].pts;
      break;
    }
    case "ev-kid-tog": {
      const tplId=el.dataset.tpl, kid=el.dataset.kid;
      const tpl=(state.eventTemplates||[]).find(x=>x.id===tplId); if(!tpl) break;
      if(!evLive[tplId]) evLive[tplId]={pts:tpl.points, childIds:[]};
      const arr=evLive[tplId].childIds;
      const idx=arr.indexOf(kid);
      if(idx>=0) arr.splice(idx,1); else arr.push(kid);
      el.classList.toggle("on", arr.includes(kid));
      break;
    }
    case "apply-ev-inline": {
      const tpl=(state.eventTemplates||[]).find(x=>x.id===id); if(!tpl) break;
      if(!evLive[id]) evLive[id]={pts:tpl.points, childIds:[]};
      const live=evLive[id];
      if(live.childIds.length===0){ toast(t("toastSelectChild")); break; }
      applyEvent(tpl.type, tpl.title, live.pts, live.childIds);
      toast(t(tpl.type==="powerup"?"toastPowerUpApplied":"toastBombApplied"));
      evLive[id]={pts:tpl.points, childIds:[]};
      const pb3=document.getElementById("parent-body");
      if(pb3) pb3.innerHTML=parentEvents();
      break;
    }
    case "del-event-tpl": {
      if(confirm(t("confirmDelTpl"))){
        state.eventTemplates=(state.eventTemplates||[]).filter(x=>x.id!==id);
        delete evLive[id];
        save(); closeModal();
        const pb4=document.getElementById("parent-body");
        if(pb4) pb4.innerHTML=parentEvents();
      }
      break;
    }

    /* investissement */
    case "inv-toggle": {
      if(!state.investment) state.investment={enabled:true,rate:2,freq:"daily"};
      state.investment.enabled = !state.investment.enabled;
      save(); refreshParentBody(); break;
    }
    case "inv-rate-up": {
      if(!state.investment) state.investment={enabled:true,rate:2,freq:"daily"};
      state.investment.rate = Math.min(100, (state.investment.rate||2) + 1);
      save();
      const rd=document.getElementById("inv-rate-display");
      if(rd) rd.textContent=state.investment.rate;
      break;
    }
    case "inv-rate-down": {
      if(!state.investment) state.investment={enabled:true,rate:2,freq:"daily"};
      state.investment.rate = Math.max(1, (state.investment.rate||2) - 1);
      save();
      const rd2=document.getElementById("inv-rate-display");
      if(rd2) rd2.textContent=state.investment.rate;
      break;
    }
    case "inv-freq": {
      if(!state.investment) state.investment={enabled:true,rate:2,freq:"daily"};
      state.investment.freq = el.dataset.v;
      save(); refreshParentBody(); break;
    }

    /* enfants */
    /* mode édition parental depuis l'écran enfant */
    case "child-edit-gear": {
      if(state.parentPin){
        openModal(`
          <h3>⚙️ ${state.lang==="en"?"Parental access":"Accès parental"}</h3>
          <label class="fld">${t("fldEnterPin")}</label>
          <input class="in" id="gear-pin-in" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="••••" style="text-align:center;letter-spacing:8px;font-size:24px">
          <div class="modal-actions">
            <button class="btn btn-ghost" data-action="modal-cancel">${t("btnCancel")}</button>
            <button class="btn btn-yes" data-action="gear-pin-confirm">${t("btnOK")}</button>
          </div>
        `);
        setTimeout(()=>{ const inp=document.getElementById("gear-pin-in"); if(inp) inp.focus(); },50);
      } else {
        view.childEditMode = true; render();
      }
      break;
    }
    case "gear-pin-confirm": {
      const v=(document.getElementById("gear-pin-in")||{}).value||"";
      if(v===state.parentPin){ view.childEditMode=true; closeModal(); render(); }
      else { toast(t("toastWrongPin")); }
      break;
    }
    case "child-edit-done": { view.childEditMode=false; render(); break; }
    case "add-task-child": {
      const preChild = child(id);
      formState = {
        id:null, type:"mission", extremeMode:"solo", allDayRequired:false,
        title:"", points:5, freq:"daily",
        childIds: preChild ? [preChild.id] : (state.children[0]?[state.children[0].id]:[]),
        periodId:"allday", carryOn:false, carryOnPenalty:0, incompletePenalty:0,
      };
      drawTaskForm(); break;
    }
    case "skip-task": {
      const taskId=id, childId=view.childId;
      const tsk=task(taskId); if(!tsk) break;
      const pk=periodKey(tsk.freq);
      if(!state.skips) state.skips=[];
      const idx=state.skips.findIndex(x=>x.taskId===taskId && x.childId===childId && x.periodKey===pk);
      const nowSkipped = idx<0;
      if(idx>=0) state.skips.splice(idx,1);
      else state.skips.push({id:uid(), taskId, childId, periodKey:pk, skippedAt:Date.now()});
      save();
      const card=document.getElementById("tc-"+taskId);
      if(card){
        card.style.opacity = nowSkipped ? "0.4" : "";
        const btn=card.querySelector("[data-action='skip-task']");
        if(btn){
          btn.textContent = nowSkipped ? t("skipped") : t("skip");
          btn.style.background = nowSkipped ? "#ddd" : "var(--line)";
          btn.style.color = nowSkipped ? "#888" : "var(--ink-soft)";
        }
      }
      break;
    }

    case "new-child": childForm(null); break;
    case "edit-child": childForm(child(id)); break;
    case "child-edit-self": { const k=child(id); if(k) childSelfEditForm(k); break; }
    case "pick-color-self": {
      formState.color = el.dataset.c;
      document.querySelectorAll("#k-color-self .opt").forEach(btn=>{
        const on = btn.dataset.c.toLowerCase()===el.dataset.c.toLowerCase();
        btn.classList.toggle("on", on);
        btn.textContent = on ? "✓" : " ";
      });
      break;
    }
    case "save-child-self": {
      const emoji=((document.getElementById("k-emoji-self")||{}).value||"").trim();
      const k=child(formState.id); if(!k) break;
      k.emoji = emoji || formState.emoji;
      k.color = formState.color;
      save(); closeModal(); render(); break;
    }
    case "del-child": {
      const k=child(id); if(!k) break;
      if(confirm(t("confirmDelChild",{name:k.name}))){
        closeModal(); deleteChild(id); render(); toast(t("toastChildDeleted"));
      }
      break;
    }
    case "pick-color": formState.color=el.dataset.c; childForm({id:formState.id,name:(document.getElementById("k-name")||{}).value||formState.name,emoji:(document.getElementById("k-emoji")||{}).value||formState.emoji,color:el.dataset.c}); break;
    case "save-child": {
      const name=((document.getElementById("k-name").value||"").trim());
      const emoji=((document.getElementById("k-emoji").value||"").trim())||"⭐";
      if(!name){ toast(t("toastNeedChildName")); break; }
      if(formState.id){
        const k=child(formState.id);
        k.name=name; k.emoji=emoji; k.color=formState.color;
      } else {
        state.children.push({id:uid(), name, emoji, color:formState.color, points:0});
      }
      save(); closeModal(); render(); toast(t("toastChildSaved"));
      break;
    }
    case "pts": adjustPoints(id, parseInt(el.dataset.d,10)); render(); break;
    case "pts-custom": {
      const v=prompt(t("promptCustomPts"));
      if(v!==null){ const n=parseInt(v,10); if(!isNaN(n)){ adjustPoints(id,n); render(); } }
      break;
    }

    /* périodes */
    case "new-period": periodForm(null); break;
    case "edit-period": periodForm(period(id)); break;
    case "toggle-period": {
      const p = period(id); if(!p) break;
      p.active = !p.active; save(); render(); break;
    }
    case "pick-period-active":
      periodFormState.active = el.dataset.v==="true"; drawPeriodForm(); break;
    case "save-period": {
      const emoji=(document.getElementById("pf-emoji").value||"⏰").trim()||"⏰";
      if(periodFormState.isAllDay){
        const p=period(periodFormState.id); if(!p) break;
        p.emoji=emoji;
        save(); closeModal(); render(); toast(t("toastPeriodSaved")); break;
      }
      const name=(document.getElementById("pf-name").value||"").trim();
      if(!name){ toast(t("toastNeedPeriodName")); break; }
      if(periodFormState.id){
        const p=period(periodFormState.id);
        p.name=name; p.emoji=emoji; p.active=periodFormState.active;
        p.startTime=(document.getElementById("pf-start")||{}).value||p.startTime;
        p.endTime=(document.getElementById("pf-end")||{}).value||p.endTime;
      } else {
        state.periods.push({
          id:uid(), name, emoji, active:periodFormState.active, isAllDay:false,
          startTime:(document.getElementById("pf-start")||{}).value||"08:00",
          endTime:(document.getElementById("pf-end")||{}).value||"12:00",
        });
      }
      save(); closeModal(); render(); toast(t("toastPeriodSaved")); break;
    }
    case "del-period": {
      const p=period(id); if(!p||p.isAllDay) break;
      if(confirm(t("confirmDelPeriod",{name:p.name}))){
        state.periods=state.periods.filter(x=>x.id!==id);
        save(); closeModal(); render(); toast(t("toastPeriodDeleted"));
      }
      break;
    }

    /* rappel lundi */
    case "skip-backup-reminder":
      state.lastMondayReminderDate=todayStr(); save(); closeModal(); break;
    case "monday-backup":
      state.lastMondayReminderDate=todayStr(); save(); closeModal(); exportBackup(); break;

    /* réglages */
    case "export-backup": exportBackup(); break;
    case "trigger-import": document.getElementById("restore-input").click(); break;
    case "set-pin": pinPrompt("set"); break;
    case "save-pin": {
      const v=(document.getElementById("pin-in").value||"").trim();
      if(!/^\d{4}$/.test(v)){ toast(t("toastNeedPin")); break; }
      state.parentPin=v; save(); closeModal(); render(); toast(t("toastPinSaved"));
      break;
    }
    case "clear-pin":
      if(confirm(t("confirmRemovePin"))){ state.parentPin=""; save(); render(); }
      break;
    case "reset-all":
      if(confirm(t("confirmReset"))){
        state = defaults(); save(); go("lock"); toast(t("toastReset"));
      }
      break;

    /* modale */
    case "modal-cancel": closeModal(); break;
    case "modal-bg": if(e.target.classList.contains("modal-bg")) closeModal(); break;
  }
});

/* ============ Moteur de pénalités automatiques ============
   Lancé au chargement + à chaque retour au premier plan.

   carryOnPenalty  → réduit les points de la tâche (pas de bombe), une seule fois.
                     Stocké dans state.carryPenalties["taskId|childId"] = adjPts.
   incompletePenalty → bombe "nom : non complétée", une fois par occurrence de période.

   state.penaltyLog["key"] = dateStr  empêche la double application.
   "pending" (soumis, attente approbation) = exempt.
============================================================ */
function applyInvestment(){
  if(!state.investment) state.investment = {enabled:true, rate:2, freq:"daily"};
  const inv = state.investment;
  if(!inv.enabled) return;

  const today = todayStr();
  const lastApplied = state.lastInvestmentApplied || "";

  /* Calculer la date de déclenchement la plus récente */
  let triggerDate = "";
  if(inv.freq === "daily"){
    triggerDate = today;
  } else if(inv.freq === "weekly"){
    const d = new Date();
    const daysBack = (d.getDay() - 5 + 7) % 7; /* jours depuis le vendredi */
    const fri = new Date(d);
    fri.setDate(d.getDate() - daysBack);
    triggerDate = fri.getFullYear() + "-" + pad(fri.getMonth()+1) + "-" + pad(fri.getDate());
  } else if(inv.freq === "monthly"){
    const d = new Date();
    triggerDate = d.getFullYear() + "-" + pad(d.getMonth()+1) + "-01";
  }

  if(!triggerDate || lastApplied >= triggerDate) return;

  state.lastInvestmentApplied = today;
  state.children.forEach(c => {
    if(c.points <= 0) return;
    const gain = Math.ceil(c.points * inv.rate / 100);
    if(gain <= 0) return;
    applyEvent("investment", t("invEventTitle"), gain, [c.id]);
  });
  save();
}

function applyPenalties(){
  if(!state.penaltyLog)    state.penaltyLog    = {};
  if(!state.carryPenalties) state.carryPenalties = {};

  const now    = new Date();
  const nowStr = pad(now.getHours()) + ":" + pad(now.getMinutes());
  const today  = todayStr();
  let changed  = false;

  /* — Passe 1 : pénalités de fin de période — */
  state.tasks.forEach(tsk => {
    if(!tsk.carryOnPenalty && !tsk.incompletePenalty) return;
    const p = period(tsk.periodId);
    if(!p || p.isAllDay) return;       /* pas de limite horaire pour all-day */
    if(nowStr <= p.endTime) return;    /* période pas encore terminée */

    const pk = periodKey(tsk.freq);

    taskChildIds(tsk).forEach(cid => {
      const st = taskStatusFor(tsk, cid);
      if(st === "done" || st === "pending" || st === "skipped") return; /* complété, soumis ou ignoré → exempt */

      /* réduction de report : modifie les pts de la tâche pour cet enfant, une fois */
      if(tsk.carryOn && tsk.carryOnPenalty > 0){
        const logKey = `${tsk.id}|${cid}|carry`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          state.carryPenalties[`${tsk.id}|${cid}`] =
            Math.max(0, tsk.points - tsk.carryOnPenalty);
          changed = true;
        }
      }

      /* pénalité d'incomplétion (sans carry-on) → bombe */
      if(!tsk.carryOn && tsk.incompletePenalty > 0){
        const logKey = `${tsk.id}|${cid}|${pk}|incomplete`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          applyEvent("bomb",
            esc(tsk.title) + " : " + t("incompleteSuffix"),
            tsk.incompletePenalty, [cid]);
          changed = true;
        }
      }
    });
  });

  /* — Passe 2 : pénalités de fin de journée (carryOn + incompletePenalty) — */
  const lastDay = state.lastDayChecked || today;
  if(lastDay !== today){
    const prevDate = new Date(lastDay + "T12:00:00");

    state.tasks.forEach(tsk => {
      if(!tsk.carryOn || !tsk.incompletePenalty) return;
      const p = period(tsk.periodId);
      if(!p || p.isAllDay) return;

      const prevPk = periodKey(tsk.freq, prevDate);
      const currPk = periodKey(tsk.freq);
      if(prevPk === currPk) return; /* même occurrence de fréquence → rien */

      taskChildIds(tsk).forEach(cid => {
        /* complétion (approuvée ou soumise) dans la période précédente → exempt */
        const prevDone = state.completions.some(x =>
          x.taskId===tsk.id && x.childId===cid && x.periodKey===prevPk);
        if(prevDone) return;

        const logKey = `${tsk.id}|${cid}|${prevPk}|incomplete-eod`;
        if(!state.penaltyLog[logKey]){
          state.penaltyLog[logKey] = today;
          applyEvent("bomb",
            esc(tsk.title) + " : " + t("incompleteSuffix"),
            tsk.incompletePenalty, [cid]);
          changed = true;
        }
      });
    });

    state.lastDayChecked = today;
    changed = true;
  }

  if(changed) save();
}

applyPenalties();
applyInvestment();
cleanupPurchases();
document.addEventListener("visibilitychange", () => {
  if(!document.hidden){ applyPenalties(); applyInvestment(); cleanupPurchases(); }
});

render();
if(new Date().getDay()===1 && state.lastMondayReminderDate!==todayStr()){
  openBackupReminderModal();
}

/* ---- Refresh automatique le dimanche ---- */
(function(){
  const KEY = "missions_sunday_reload";
  function checkSundayReload(){
    if(new Date().getDay() !== 0) return;          // pas dimanche
    const today = todayStr();
    if(localStorage.getItem(KEY) === today) return; // déjà fait aujourd'hui
    localStorage.setItem(KEY, today);
    location.reload(true);
  }
  checkSundayReload();
  document.addEventListener("visibilitychange", () => { if(!document.hidden) checkSundayReload(); });
})();
</script>
