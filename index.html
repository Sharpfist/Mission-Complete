<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mission Récompenses</title>
<style>
  :root{
    --ink:#23214A;
    --ink-soft:#6A6790;
    --cream:#FBF6EC;
    --card:#FFFFFF;
    --gold:#FFC53D;
    --gold-deep:#E89B0C;
    --c1:#FF6B6B;
    --c2:#1FB6A6;
    --c3:#8B7FF5;
    --good:#2BB673;
    --wait:#F2A33C;
    --line:#ECE6DA;
    --shadow:0 10px 30px rgba(35,33,74,.10);
    --radius:22px;
    font-family: ui-rounded, "SF Pro Rounded", -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;padding:0;background:var(--cream);color:var(--ink);}
  body{
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 110% -10%, rgba(255,197,61,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(139,127,245,.16), transparent 55%),
      var(--cream);
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .wrap{max-width:880px;margin:0 auto;padding:18px 16px 120px;}
  h1,h2,h3{margin:0;font-weight:800;letter-spacing:-.02em;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  .pill{display:inline-flex;align-items:center;gap:8px;font-weight:800;}
  .coin{
    display:inline-flex;align-items:center;gap:7px;
    background:linear-gradient(180deg,#FFE08A,var(--gold));
    color:#6b4a00;border-radius:999px;padding:6px 14px;font-weight:900;
    box-shadow: inset 0 -2px 0 rgba(0,0,0,.08);
  }
  .coin .dot{width:18px;height:18px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff6cf,var(--gold-deep));box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);}

  /* ---------- LOCK / CHOOSE ---------- */
  .brand{display:flex;align-items:center;justify-content:center;gap:10px;margin:6px 0 4px;}
  .brand .logo{font-size:30px}
  .brand h1{font-size:26px}
  .tagline{text-align:center;color:var(--ink-soft);font-weight:600;margin:0 0 22px;font-size:15px}
  .who-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
  .who{
    position:relative;background:var(--card);border-radius:var(--radius);padding:22px 14px;text-align:center;
    box-shadow:var(--shadow);border:3px solid transparent;transition:transform .12s ease;
  }
  .who:active{transform:scale(.97)}
  .ev-q{position:absolute;top:7px;right:8px;width:24px;height:24px;border-radius:50%;
    background:#FF6B00;color:#fff;font-size:14px;font-weight:900;
    display:flex;align-items:center;justify-content:center;
    animation:shake-q .65s ease-in-out infinite}
  @keyframes shake-q{0%,100%{transform:translateX(0)}22%{transform:translateX(-4px)}44%{transform:translateX(4px)}66%{transform:translateX(-3px)}88%{transform:translateX(3px)}}
  .who .face{font-size:46px;line-height:1}
  .who .nm{font-weight:800;margin-top:10px;font-size:18px}
  .who .pts{margin-top:8px}
  .parent-btn{
    margin:22px auto 0;display:flex;align-items:center;justify-content:center;gap:10px;
    background:var(--ink);color:#fff;border-radius:16px;padding:15px 22px;font-weight:800;font-size:16px;
    box-shadow:var(--shadow);width:100%;max-width:340px;
  }
  .parent-btn:active{transform:scale(.98)}
  .lang-btn{background:#fff;border-radius:10px;padding:6px 14px;font-weight:900;font-size:13px;box-shadow:var(--shadow);color:var(--ink-soft);}
  .lang-btn:active{transform:scale(.96)}

  /* ---------- HEADER (child / parent) ---------- */
  .top{display:flex;align-items:center;gap:12px;margin-bottom:18px;}
  .back{background:#fff;border-radius:14px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:var(--shadow);flex:none;}
  .top .who-name{font-size:22px;font-weight:900;}
  .top .spacer{flex:1}

  .hero{
    border-radius:26px;padding:20px 22px;color:#fff;margin-bottom:18px;
    box-shadow:var(--shadow);position:relative;overflow:hidden;
  }
  .hero .emoji{position:absolute;right:-6px;bottom:-18px;font-size:120px;opacity:.22;transform:rotate(-8deg)}
  .hero .label{font-weight:700;opacity:.9;font-size:14px}
  .hero .big{font-size:46px;font-weight:900;line-height:1.05;margin-top:2px;display:flex;align-items:center;gap:12px}
  .hero .big .c{width:38px;height:38px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#fff7d6,#ffd34d);box-shadow:inset 0 0 0 3px rgba(255,255,255,.55)}
  .hero .sub{margin-top:8px;font-weight:700;opacity:.92;font-size:14px}

  /* ---------- SECTIONS ---------- */
  .section-h{display:flex;align-items:center;gap:10px;margin:22px 4px 12px;}
  .section-h h3{font-size:16px;color:var(--ink)}
  .section-h .tag{font-size:12px;font-weight:800;color:var(--ink-soft);background:#fff;border:1px solid var(--line);padding:3px 9px;border-radius:999px}

  .task{
    background:var(--card);border-radius:18px;padding:14px 14px 14px 16px;margin-bottom:10px;
    display:flex;align-items:center;gap:14px;box-shadow:var(--shadow);
  }
  .task .meta{flex:1;min-width:0}
  .task .t{font-weight:800;font-size:16px}
  .task .f{font-size:13px;color:var(--ink-soft);font-weight:600;margin-top:2px}
  .task .pts-badge{background:#FFF4D6;color:#a06d00;font-weight:900;border-radius:12px;padding:6px 11px;font-size:14px;white-space:nowrap}
  .do{
    background:var(--good);color:#fff;font-weight:900;border-radius:14px;padding:12px 16px;font-size:15px;white-space:nowrap;
    box-shadow:inset 0 -3px 0 rgba(0,0,0,.12);
  }
  .do:active{transform:translateY(1px)}
  .do.waiting{font-size:12px;padding:8px 10px;white-space:normal;text-align:center;line-height:1.3;max-width:90px}
  .waiting,.done-chip,.status-chip{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    border-radius:14px;padding:8px 12px;font-size:13px;font-weight:900;
    text-align:center;line-height:1.25;min-width:54px;max-width:76px;
  }
  .waiting{background:#FFF1DE;color:#b86a00}
  .done-chip{background:#E6F7EE;color:#1d8a55}
  .status-chip{background:var(--line);color:var(--ink-soft)}

  .empty{
    background:#fff;border:2px dashed var(--line);border-radius:18px;padding:26px 18px;text-align:center;
    color:var(--ink-soft);font-weight:700;
  }
  .empty .em{font-size:34px;display:block;margin-bottom:6px}

  /* ---------- STORE ---------- */
  .reward{
    background:var(--card);border-radius:18px;padding:16px;box-shadow:var(--shadow);
    display:flex;flex-direction:column;gap:10px;
  }
  .store-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.store-grid{grid-template-columns:1fr}}
  .reward .r-top{display:flex;align-items:center;gap:10px}
  .reward .r-emoji{font-size:30px}
  .reward .r-name{font-weight:800;font-size:16px;flex:1}
  .buy{background:var(--gold);color:#6b4a00;font-weight:900;border-radius:14px;padding:12px;font-size:15px;box-shadow:inset 0 -3px 0 rgba(0,0,0,.10)}
  .buy.locked{background:#EFEADF;color:#9a937f}
  .buy:active{transform:translateY(1px)}

  /* ---------- PARENT NAV ---------- */
  .tabs{display:flex;gap:8px;background:#fff;padding:6px;border-radius:18px;box-shadow:var(--shadow);margin-bottom:18px;overflow:auto}
  .tab{flex:1;white-space:nowrap;text-align:center;padding:11px 10px;border-radius:13px;font-weight:800;color:var(--ink-soft);font-size:14px}
  .tab.active{background:var(--ink);color:#fff}
  .badge-n{display:inline-block;min-width:20px;padding:0 6px;height:20px;line-height:20px;background:var(--c1);color:#fff;border-radius:999px;font-size:12px;font-weight:900;margin-left:6px}

  /* ---------- PARENT CARDS ---------- */
  .card{background:#fff;border-radius:18px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
  .row{display:flex;align-items:center;gap:12px}
  .row .grow{flex:1;min-width:0}
  .muted{color:var(--ink-soft);font-weight:600;font-size:13px}
  .who-chip{display:inline-flex;align-items:center;gap:6px;font-weight:800;font-size:13px;padding:4px 10px;border-radius:999px;color:#fff}

  .approve-card .who-line{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .btn-line{display:flex;gap:8px;margin-top:12px}
  .btn{flex:1;text-align:center;border-radius:13px;padding:12px;font-weight:900;font-size:15px}
  .btn-yes{background:var(--good);color:#fff}
  .btn-no{background:#FCE9E9;color:#c0392b}
  .btn-ghost{background:#F3EFE6;color:var(--ink)}

  .add-btn{
    width:100%;background:var(--ink);color:#fff;border-radius:16px;padding:15px;font-weight:900;font-size:16px;
    box-shadow:var(--shadow);margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:9px;
  }
  .add-btn:active{transform:scale(.99)}

  .tpl-wrap{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
  .tpl{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 13px;font-weight:800;font-size:14px;box-shadow:0 4px 12px rgba(35,33,74,.05)}
  .tpl b{color:var(--gold-deep)}
  .tpl:active{transform:scale(.97)}

  .mini{display:flex;gap:6px;flex-wrap:wrap}
  .mini button{background:#F3EFE6;border-radius:10px;padding:8px 12px;font-weight:800;font-size:14px}
  .mini button:active{transform:scale(.96)}

  .item-actions{display:flex;gap:6px}
  .icon-btn{width:40px;height:40px;border-radius:12px;background:#F3EFE6;display:flex;align-items:center;justify-content:center;font-size:18px}
  .icon-btn:active{transform:scale(.95)}
  .drag-handle{width:40px;height:40px;border-radius:12px;background:#F3EFE6;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:grab;flex-shrink:0}
  .drag-lines{display:flex;flex-direction:column;gap:4px;pointer-events:none}
  .drag-lines b{display:block;width:18px;height:2.5px;background:var(--ink-soft);border-radius:2px}

  /* ---------- MODAL ---------- */
  .modal-bg{position:fixed;inset:0;background:rgba(35,33,74,.45);display:flex;align-items:flex-end;justify-content:center;z-index:50;backdrop-filter:blur(2px)}
  @media(min-width:560px){.modal-bg{align-items:center}}
  .modal{
    background:#fff;border-radius:26px 26px 0 0;width:100%;max-width:520px;padding:22px 20px 26px;
    box-shadow:0 -10px 40px rgba(0,0,0,.2);max-height:92vh;overflow-y:auto;
    -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    will-change:transform;
  }
  .modal-drag-bar{width:40px;height:4px;background:var(--line);border-radius:4px;margin:0 auto 18px;}
  body.modal-open{position:fixed;left:0;right:0;width:100%;overflow:hidden;}
  @media(min-width:560px){.modal{border-radius:26px}}
  .modal h3{font-size:20px;margin-bottom:16px}
  label.fld{display:block;font-weight:800;font-size:13px;color:var(--ink-soft);margin:12px 2px 6px}
  input.in,select.in{
    width:100%;border:2px solid var(--line);border-radius:14px;padding:14px;font-size:16px;font-weight:700;
    color:var(--ink);background:#fff;font-family:inherit;
  }
  input.in:focus,select.in:focus{outline:none;border-color:var(--ink)}
  .seg{display:flex;gap:8px;flex-wrap:wrap}
  .seg .opt{flex:1;min-width:120px;text-align:center;border:2px solid var(--line);border-radius:14px;padding:12px;font-weight:800;font-size:14px}
  .seg .opt.on{border-color:var(--ink);background:var(--ink);color:#fff}
  .kid-pick{display:flex;gap:8px;flex-wrap:wrap}
  .kid-pick .opt{flex:1;min-width:90px;text-align:center;border:3px solid var(--line);border-radius:14px;padding:12px 8px;font-weight:800;font-size:14px}
  .kid-pick .opt.on{border-color:currentColor}
  .modal-actions{display:flex;gap:10px;margin-top:22px}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
  .cal-hd{text-align:center;font-size:11px;font-weight:700;color:var(--ink-soft);padding:3px 0}
  .cal-day{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:0;height:38px;font-size:14px;font-weight:700;color:var(--ink)}
  .cal-day.cal-sel{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wk-panel{margin:2px 0 4px;animation:wkIn .25s ease}
  .wk-divider{border-top:1.5px solid var(--line);margin:16px 0 2px}
  @keyframes wkIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .wk-modes{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
  .wk-mode{background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:13px 8px;font-size:13px;font-weight:800;color:var(--ink);line-height:1.2}
  .wk-mode.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .wk-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:4px 0 6px}
  .wk-sub{background:var(--bg);border-radius:14px;padding:12px 14px;margin-top:4px}
  .wk-intro{font-size:12px;color:var(--ink-soft);line-height:1.35;margin-bottom:8px}
  .wk-hint{font-size:12px;color:var(--ink-soft);text-align:center;padding:2px 0 2px}
  .wk-cool-row{display:flex;align-items:center;justify-content:center;gap:14px}
  .wk-cool-row button{width:38px;height:38px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-size:20px;font-weight:900;color:var(--ink)}
  .wk-cool-row span{font-weight:800;font-size:15px;min-width:86px;text-align:center}
  .mth-days{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin:4px 0 6px}
  .mth-day{background:#fff;border:1.5px solid var(--line);border-radius:10px;padding:0;height:38px;font-size:13px;font-weight:700;color:var(--ink)}
  .mth-day.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .mth-nth-grid{display:grid;grid-template-columns:46px repeat(7,1fr);gap:3px;margin:4px 0 6px}
  .mth-nth-hd{font-size:10px;font-weight:800;color:var(--ink-soft);text-align:center;padding:3px 0}
  .mth-nth-lbl{font-size:10px;font-weight:800;color:var(--ink-soft);display:flex;align-items:center;line-height:1.2}
  .mth-nth-cell{background:#fff;border:1.5px solid var(--line);border-radius:8px;padding:0;height:32px;font-size:11px;font-weight:700;color:var(--ink)}
  .mth-nth-cell.on{background:var(--ink);color:#fff;border-color:var(--ink)}
  .toast{
    position:fixed;left:50%;top:20px;transform:translateX(-50%) translateY(-20px);opacity:0;
    background:var(--ink);color:#fff;font-weight:800;padding:13px 20px;border-radius:14px;z-index:80;
    box-shadow:var(--shadow);transition:all .25s ease;pointer-events:none;font-size:15px;text-align:center;max-width:90%;
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hist-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)}
  .hist-row:last-child{border-bottom:none}
  .hist-row .h-pts{font-weight:900;white-space:nowrap}
  .footer-note{text-align:center;color:var(--ink-soft);font-size:12px;font-weight:600;margin-top:26px;line-height:1.5}

  /* ---------- TOGGLE SWITCH ---------- */
  .toggle-sw{
    width:50px;height:28px;border-radius:14px;background:#DDD;position:relative;
    transition:background .2s;flex:none;cursor:pointer;border:none;padding:0;
  }
  .toggle-sw.on{background:var(--good);}
  .toggle-sw::after{
    content:"";width:24px;height:24px;border-radius:12px;background:#fff;
    position:absolute;top:2px;left:2px;transition:transform .2s;
    box-shadow:0 1px 4px rgba(0,0,0,.25);pointer-events:none;
  }
  .toggle-sw.on::after{transform:translateX(22px);}
  .toggle-sw:active{opacity:.85}

  /* ---------- PERIOD BADGES ---------- */
  .period-badge{font-weight:800;font-size:12px;padding:4px 10px;border-radius:999px;white-space:nowrap}
  .period-active{background:#E6F7EE;color:#1d8a55;}
  .period-inactive{background:#F3EFE6;color:var(--ink-soft);}
  .period-allday{background:#FFF4D6;color:#a06d00;}
  .danger-zone{margin-top:16px;border-top:1px solid var(--line);padding-top:14px}

  /* ---------- EVENT ANIMATIONS ---------- */
  @keyframes ev-star-out{
    0%{transform:translate(-50%,-50%) scale(0.3);opacity:1}
    100%{transform:translate(calc(-50% + var(--dx)),calc(-50% + var(--dy))) scale(1);opacity:0}
  }
  @keyframes ev-pts-float{
    0%{opacity:0;transform:translate(-50%,-50%)}
    15%{opacity:1;transform:translate(-50%,-65%)}
    72%{opacity:1;transform:translate(-50%,-95%)}
    100%{opacity:0;transform:translate(-50%,-120%)}
  }
  @keyframes ev-bomb-fall{
    0%{transform:translate(-50%,-300%) rotate(-15deg) scale(0.3);opacity:0}
    65%{transform:translate(-50%,-50%) rotate(5deg) scale(1.15);opacity:1}
    82%{transform:translate(-50%,-50%) rotate(-3deg) scale(0.92);opacity:1}
    100%{transform:translate(-50%,-50%) scale(0);opacity:0}
  }
  @keyframes ev-explode{
    0%{font-size:0;opacity:0}
    25%{font-size:110px;opacity:1}
    100%{font-size:170px;opacity:0}
  }
  @keyframes ev-flash{0%{opacity:0.6}100%{opacity:0}}
  @keyframes ev-pts-up-side{
    0%{opacity:0;transform:translateY(-50%)}
    12%{opacity:1;transform:translateY(-50%)}
    70%{opacity:1;transform:translateY(calc(-50% - 38px))}
    100%{opacity:0;transform:translateY(calc(-50% - 58px))}
  }
  @keyframes ev-pts-down-side{
    0%{opacity:0;transform:translateY(-50%)}
    12%{opacity:1;transform:translateY(-50%)}
    70%{opacity:1;transform:translateY(calc(-50% + 38px))}
    100%{opacity:0;transform:translateY(calc(-50% + 58px))}
  }
  @keyframes ev-hero-pulse{
    0%{transform:scale(1)}40%{transform:scale(1.06)}70%{transform:scale(0.97)}100%{transform:scale(1)}
  }
  .ev-tpl-card{border-left:4px solid #ddd}
  .ev-tpl-card.powerup{border-left-color:#2BB673}
  .ev-tpl-card.bomb{border-left-color:#E74C3C}
  @keyframes fadeInDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .parental-edit-panel{animation:fadeInDown 0.25s ease both}
  .task-skipped{opacity:.4}
</style>
</head>
<body>
<div class="wrap" id="app"></div>
<div id="modal-root"></div>
<div class="toast" id="toast"></div>
<input type="file" id="restore-input" accept="application/json,.json" style="display:none">

<script>
"use strict";

/* ============ Translations ============ */
const TRANSLATIONS = {
  fr: {
    appTitle:"Mission Récompenses",
    lockTagline:"Choisis qui tu es pour voir tes missions",
    parentBtn:"🔐 Espace parent",
    lockTip:"Astuce : ajoute cette page à l'écran d'accueil de l'iPad<br>(bouton Partager ▸ « Sur l'écran d'accueil ») pour l'ouvrir comme une vraie app.",
    myPoints:"Mes points",
    heroSub:"Termine tes missions pour en gagner plus !",
    shopBtn:"🛒 Boutique des récompenses",
    groupToday:"Aujourd'hui",groupWeek:"Cette semaine",groupMonth:"Ce mois-ci",groupSpecial:"Missions spéciales",
    btnDone:"J'ai fait ✓",statusPending:"⏳ En attente",statusDone:"✅ Bravo !",toastUndoTask:"Annulé ↩",
    noTasks:"Aucune mission pour l'instant.<br>Un parent peut en ajouter dans l'espace parent.",
    storeTitle:"🛒 Boutique",buyBtn:"Acheter — {cost} pts",buyLocked:"🔒 {cost} pts",
    storeNote:"Quand tu achètes, tes points baissent.<br>Va voir un parent pour recevoir ta surprise 😊",
    noRewards:"Aucune récompense pour l'instant.",
    tabApprove:"À valider",tabTasks:"Missions",tabStore:"Boutique",tabChildren:"Enfants",tabInvestment:"Investissement",tabSettings:"Réglages",
    skip:"Ignorer",skipped:"Ignorée",pushTomorrow:"Pousser à demain",pushedTomorrow:"Remise à demain",parentalDone:"Terminé ✓",
    noApprovals:"Rien à valider pour le moment.<br>Quand un enfant coche « J'ai fait », ça apparaît ici.",
    btnApprove:"✓ Valider (+{pts})",btnReject:"✗ Refuser",
    addTask:"＋ Nouvelle mission",quickTemplates:"⚡ Modèles rapides",
    quickTemplatesHint:"Touche un modèle pour créer la mission en 2 secondes.",
    editTplTitle:"Modifier le modèle",addAsTemplate:"Ajouter comme modèle",
    noTasksAssigned:"Aucune mission assignée.",

function t(key, vars){
  const lang = (state && state.lang) || "fr";
  let str = (TRANSLATIONS[lang] || TRANSLATIONS.fr)[key];
  if(str === undefined) str = TRANSLATIONS.fr[key] || key;
  if(vars) Object.keys(vars).forEach(k=>{ str = str.replace(new RegExp("{"+k+"}","g"), vars[k]); });
  return str;
}

function freqLabel(){ return { once:t("freqOnce"), daily:t("freqDaily"), weekly:t("freqWeekly"), monthly:t("freqMonthly"), calendar:t("freqCalendar") }; }
function freqShort(){ return { daily:t("freqShortDaily"), weekly:t("freqShortWeekly"), monthly:t("freqShortMonthly"), once:t("freqShortOnce"), weekdays:t("freqShortWeekdays"), calendar:t("freqShortCalendar") }; }
/* ordre d'affichage des jours (getDay()): Lu Ma Me Je Ve Sa Di */
const WEEK_DAY_ORDER = [1,2,3,4,5,6,0];
/* étiquette grise décrivant le sous-mode « Semaine » d'une mission */
function weekValueLabel(tsk){
  const mode = tsk.weekMode || "week";
  if(mode==="days"){
    const abbr = t("calDays").split(",");
    const sel  = tsk.weekDays || [];
    const labels = WEEK_DAY_ORDER.map((d,i)=> sel.includes(d) ? abbr[i] : null).filter(Boolean);
    return labels.length ? labels.join(" · ") : t("wkValDaysNone");
  }
  if(mode==="workweek") return t("wkValWork");
  if(mode==="weekend")  return t("wkValWeekend");
  const n = tsk.weekCooldown!=null ? tsk.weekCooldown : 4;
  return t("wkModeWeek") + ", +" + n + t("wkDayShort");
}
function isWeekTask(tsk){ return tsk && tsk.freq==="weekly"; }
function calFreqLabel(tsk){
  const dates = (tsk.calDates||[]).slice().sort();
  if(!dates.length) return "Cal";
  const fmt = d => d.slice(5);
  return dates.length===1 ? "Cal : "+fmt(dates[0]) : "Cal : "+fmt(dates[0])+" ~ "+fmt(dates[dates.length-1]);
}

  try { const r = localStorage.getItem(KEY); if(r) return JSON.parse(r); } catch(e){}
  if(_mem) return _mem;
  return null;
}
function save(){
  _mem = state;
  try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){}
}

/* ============ Outils de période ============ */
function pad(n){ return String(n).padStart(2,"0"); }
function todayStr(){ const d=new Date(); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function yesterdayStr(){ const d=new Date(); d.setDate(d.getDate()-1); return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function isoWeek(d){
  const x = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = x.getUTCDay() || 7;
  x.setUTCDate(x.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(x.getUTCFullYear(),0,1));
  const wk = Math.ceil((((x - yearStart)/86400000)+1)/7);
  return x.getUTCFullYear() + "-W" + pad(wk);
}
function periodKey(freq, d){
  d = d || new Date();
  if(freq==="once")     return "once";
  if(freq==="daily")    return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  if(freq==="weekdays") return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  if(freq==="calendar") return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate());
  if(freq==="weekly")   return isoWeek(d);
  if(freq==="monthly")  return d.getFullYear()+"-"+pad(d.getMonth()+1);
  return "once";
}
/* clé d'occurrence tenant compte du sous-mode Semaine :
   « Journée(s) spécifique(s) » = une occurrence par jour ; les autres modes = par semaine ISO */
function taskPK(tsk, d){
  if(tsk && tsk.freq==="weekly"  && tsk.weekMode==="days")  return periodKey("daily", d);
  if(tsk && tsk.freq==="monthly" && (tsk.monthMode==="day"||tsk.monthMode==="nthday")) return periodKey("daily", d);
  return periodKey(tsk ? tsk.freq : "once", d);
}
/* lundi 00:00 de la semaine contenant d */
function isoWeekMonday(d){
  const x = new Date(d);
  const back = (x.getDay()+6)%7; /* 0=lundi */
  x.setHours(0,0,0,0);
  x.setDate(x.getDate()-back);
  return x;
}
/* fenêtre [start,end] + clé de l'occurrence hebdo contenant refDate (modes week/workweek/weekend) */
function weekWindow(tsk, refDate){
  const mon  = isoWeekMonday(refDate);
  const mode = tsk.weekMode||"week";
  const start= new Date(mon), end = new Date(mon);
  if(mode==="workweek"){ end.setDate(mon.getDate()+4); end.setHours(23,59,59,999); }        /* Lu → Ve 23:59 */
  else if(mode==="weekend"){ start.setDate(mon.getDate()+4); start.setHours(14,0,0,0);
                             end.setDate(mon.getDate()+6);   end.setHours(23,59,59,999); }    /* Ve 14h → Di 23:59 */
  else { end.setDate(mon.getDate()+6); end.setHours(23,59,59,999); }                          /* Lu → Di 23:59 */
  return {start, end, key:isoWeek(refDate)};
}
/* la fenêtre hebdo est-elle active maintenant ? (pour l'affichage enfant) */
function weekWindowActive(tsk, now){
  now = now || new Date();
  const dow = now.getDay();
  const hm  = pad(now.getHours())+":"+pad(now.getMinutes());
  const mode = tsk.weekMode||"week";
  if(mode==="days")     return (tsk.weekDays||[]).includes(dow);
  if(mode==="workweek") return dow>=1 && dow<=5;
  if(mode==="weekend"){ if(dow===5) return hm>="14:00"; return dow===0||dow===6; }
  return true; /* 1x/sem : disponible toute la semaine */
}
/* cooldown « 1x/sem » : après complétion, indisponible jusqu'à date de complétion + N jours */
function weekCooldownActive(tsk, childId, now){
  if((tsk.weekMode||"week")!=="week") return false;
  const n = tsk.weekCooldown!=null ? tsk.weekCooldown : 4;
  if(n<=0) return false;
  const comps = state.completions.filter(x=>x.taskId===tsk.id && x.childId===childId);
  if(!comps.length) return false;
  const last  = comps.reduce((a,b)=> (b.approvedAt||b.createdAt) > (a.approvedAt||a.createdAt) ? b : a);
  const avail = (last.approvedAt||last.createdAt) + n*86400000;
  return (now?now.getTime():Date.now()) < avail;
}
/* faut-il afficher cette mission hebdo à l'enfant maintenant ? */
function weekShow(tsk, childId){
  if(tsk.freq!=="weekly") return true;
  const st = taskStatusFor(tsk, childId);
  if(st==="done" || st==="pending") return true;   /* montrer le statut en cours */
  if(weekCooldownActive(tsk, childId)) return false;
  return weekWindowActive(tsk);
}

/* ============ Logique Mensuelle ============ */
function isMonthTask(tsk){ return tsk && tsk.freq==="monthly"; }
/* jours effectifs du mois (rétrograde si mois court) */
function effectiveMonthDays(tsk, refDate){
  refDate = refDate || new Date();
  const daysInMonth = new Date(refDate.getFullYear(), refDate.getMonth()+1, 0).getDate();
  return (tsk.monthDays||[tsk.monthDay||1]).map(d=>Math.min(d,daysInMonth));
}
/* résout les sélections {week,dow} en numéros de jours du mois (dédupliqués) */
function resolveMonthWeekdays(tsk, refDate){
  refDate = refDate || new Date();
  const y = refDate.getFullYear(), m = refDate.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const sels = tsk.monthWeekdays || [];
  const dateSet = new Set();
  sels.forEach(({week, dow}) => {
    if(week === "last"){
      for(let d = daysInMonth; d >= 1; d--){
        if(new Date(y, m, d).getDay() === dow){ dateSet.add(d); break; }
      }
    } else {
      let count = 0;
      for(let d = 1; d <= daysInMonth; d++){
        if(new Date(y, m, d).getDay() === dow){
          count++;
          if(count === week){ dateSet.add(d); break; }
        }
      }
    }
  });
  return [...dateSet].sort((a,b)=>a-b);
}

/* fenêtre [start,end] de l'occurrence mensuelle contenant refDate */
function monthWindow(tsk, refDate){
  refDate = refDate || new Date();
  const y = refDate.getFullYear(), m = refDate.getMonth();
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const mode = tsk.monthMode || "month";
  let start, end;
  if(mode==="day"){
    const days = effectiveMonthDays(tsk, refDate).sort((a,b)=>a-b);
    const first = days[0]||1, last = days[days.length-1]||1;
    start = new Date(y, m, first, 0, 0, 0, 0);
    end   = new Date(y, m, last,  23, 59, 59, 999);
  } else if(mode==="start"){
    const w = tsk.monthWindow!=null ? tsk.monthWindow : 7;
    start = new Date(y, m, 1, 0, 0, 0, 0);
    end   = new Date(y, m, Math.min(w, daysInMonth), 23, 59, 59, 999);
  } else if(mode==="end"){
    const w = tsk.monthWindow!=null ? tsk.monthWindow : 7;
    start = new Date(y, m, Math.max(1, daysInMonth - w + 1), 0, 0, 0, 0);
    end   = new Date(y, m, daysInMonth, 23, 59, 59, 999);
  } else { /* 1x/mois : tout le mois */
    start = new Date(y, m, 1, 0, 0, 0, 0);
    end   = new Date(y, m, daysInMonth, 23, 59, 59, 999);
  }
  const key = y + "-" + pad(m+1);
  return {start, end, key};
}
function monthWindowActive(tsk, now){
  now = now || new Date();
  const mode = tsk.monthMode || "month";
  if(mode==="day")    return effectiveMonthDays(tsk, now).includes(now.getDate());
  if(mode==="nthday") return resolveMonthWeekdays(tsk, now).includes(now.getDate());
  const win = monthWindow(tsk, now);
  return now >= win.start && now <= win.end;
}
function monthCooldownActive(tsk, childId, now){
  if((tsk.monthMode||"month")!=="month") return false;
  const n = tsk.monthCooldown!=null ? tsk.monthCooldown : 14;
  if(n<=0) return false;
  const comps = state.completions.filter(x=>x.taskId===tsk.id && x.childId===childId);
  if(!comps.length) return false;
  const last  = comps.reduce((a,b)=> (b.approvedAt||b.createdAt) > (a.approvedAt||a.createdAt) ? b : a);
  const avail = (last.approvedAt||last.createdAt) + n*86400000;
  return (now?now.getTime():Date.now()) < avail;
}
function monthShow(tsk, childId){
  if(tsk.freq!=="monthly") return true;
  const st = taskStatusFor(tsk, childId);
  if(st==="done" || st==="pending") return true;
  if(monthCooldownActive(tsk, childId)) return false;
  return monthWindowActive(tsk);
}
/* étiquette grise pour les missions mensuelles */
function monthValueLabel(tsk){
  const mode = tsk.monthMode || "month";
  if(mode==="day"){
    const days = (tsk.monthDays||(tsk.monthDay?[tsk.monthDay]:[])).slice().sort((a,b)=>a-b);
    return days.length ? t("mthValDay") + " " + days.join(", ") : t("mthValDay") + " —";
  }
  if(mode==="nthday") return t("mthValNthDay") + " (" + ((tsk.monthWeekdays||[]).length) + ")";
  if(mode==="start") return t("mthValStart") + " (" + (tsk.monthWindow!=null?tsk.monthWindow:7) + " " + t("mthDaysUnit") + ")";
  if(mode==="end")   return t("mthValEnd")   + " (" + (tsk.monthWindow!=null?tsk.monthWindow:7) + " " + t("mthDaysUnit") + ")";
  const n = tsk.monthCooldown!=null ? tsk.monthCooldown : 14;
  return t("mthValMonth") + ", +" + n + t("mthDayShort");
}
function isMonthBoxTask(tsk){
  if(tsk.freq!=="monthly" || isExtreme(tsk)) return false;
  const periods = state.periods || [];
  const p = periods.find(x=>x.id===tsk.periodId);
  return !tsk.periodId || tsk.periodId==="allday" || !p || p.isAllDay;
}

/* ============ Logique ============ */
function child(id){ return state.children.find(c=>c.id===id); }
function reward(id){ return state.rewards.find(r=>r.id===id); }
function task(id){ return state.tasks.find(t=>t.id===id); }
function period(id){ return (state.periods||[]).find(p=>p.id===id); }
function taskPeriodName(tsk){
  if(!tsk.periodId || tsk.periodId==="allday") return t("allDayLabel");
  const p = period(tsk.periodId);
  return p ? p.name : t("allDayLabel");
}

/* ---- Missions extrêmes : helpers ---- */
const EXTREME_EMOJI = {solo:"🧍", competitive:"⚔️", collab:"🤝", all:"👨‍👩‍👧‍👦"};
function isExtreme(tsk){ return tsk && tsk.type === "extreme"; }
function taskChildIds(tsk){ return tsk.childIds ? tsk.childIds : (tsk.childId!=null ? [tsk.childId] : []); }
function extremeEmoji(tsk){ return EXTREME_EMOJI[tsk.extremeMode] || "⭐"; }
function alldayPeriodId(){ const p=(state.periods||[]).find(x=>x.isAllDay); return p?p.id:"allday"; }

/* statut par enfant, valable pour tâche normale OU extrême partagée */
function taskStatusFor(tsk, childId){
  const pk = taskPK(tsk);
  if(state.skips && state.skips.some(x=>x.taskId===tsk.id && x.childId===childId && x.periodKey===pk)) return "skipped";
  const c = state.completions.find(x=>x.taskId===tsk.id && x.childId===childId && x.periodKey===pk);
  if(!c) return "open";
  return c.status==="approved" ? "done" : "pending";
}

function isPushedTomorrow(tsk, childId){
  return !!(state.pushes && state.pushes.some(x=>x.taskId===tsk.id && x.childId===childId && x.pushedDate===todayStr()));
}

/* mission extrême « fermée » pour la période courante (compétitif remporté / collab terminé) */
function extremeClosedKey(tsk){ return tsk.id + "|" + taskPK(tsk); }
function isExtremeClosed(tsk){ return !!(state.extremeClosed && state.extremeClosed[extremeClosedKey(tsk)]); }
function closeExtreme(tsk){
  if(!state.extremeClosed) state.extremeClosed = {};
  state.extremeClosed[extremeClosedKey(tsk)] = true;
}

/* une mission extrême se débloque pour un enfant quand toutes ses tâches
   régulières de la période assignée (+ all-day si requis) sont APPROUVÉES */
function extremeUnlocked(tsk, childId){
  const alldayId = alldayPeriodId();
  const pid = tsk.periodId || alldayId;
  const gatingIds = new Set();
  if(tsk.periodRequired !== false) gatingIds.add(pid);
  if(tsk.allDayRequired) gatingIds.add(alldayId);
  const gating = state.tasks.filter(x =>
    !isExtreme(x) &&
    taskChildIds(x).includes(childId) &&
    gatingIds.has(x.periodId || alldayId)
  );
  if(gating.length === 0) return true; // rien à compléter → surplus disponible
  return gating.every(x => taskStatusFor(x, childId) === "done");
}

function taskStatus(t){
  const pk = taskPK(t);
  const c = state.completions.find(x=>x.taskId===t.id && x.childId===t.childId && x.periodKey===pk);
  if(!c) return "open";
  return c.status==="approved" ? "done" : "pending";
}
function pendingCount(){
  const tasks = state.completions.filter(c=>{
    if(c.status !== "pending") return false;
    const tsk = task(c.taskId);
    if(tsk && isExtreme(tsk) && tsk.extremeMode === "all") return allModeReady(tsk);
    return true;
  }).length;
  const purchases = (state.purchases||[]).filter(p=>p.status==="pending"||p.status==="approved").length;
  return tasks + purchases;
}

function undoTask(taskId, childId){
  const t = task(taskId); if(!t) return;
  const cid = childId != null ? childId : t.childId;
  const pk = taskPK(t);
  state.completions = state.completions.filter(c =>
    !(c.taskId===taskId && c.childId===cid && c.periodKey===pk && c.status==="pending")
  );
  save();
}
function markDone(taskId, childId){
  const t = task(taskId); if(!t) return;
  const cid = childId != null ? childId : t.childId;
  if(cid == null) return;
  const pk = taskPK(t);
  const exists = state.completions.find(c=>c.taskId===t.id && c.childId===cid && c.periodKey===pk);
  if(exists) return;
  /* pts ajustés si une réduction de report a été appliquée */
  const cpKey = `${t.id}|${cid}`;
  const adjPts = (state.carryPenalties && state.carryPenalties[cpKey] != null)
    ? state.carryPenalties[cpKey] : null;
  state.completions.push({id:uid(), taskId:t.id, childId:cid, periodKey:pk, status:"pending",
    pts: adjPts, createdAt:Date.now()});
  save();
}
function approve(compId){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId);
  c.status = "approved"; c.approvedAt = Date.now();
  /* utilise les points ajustés stockés dans la complétion (carry penalty), sinon tsk.points */
  if(tsk){ const k = child(c.childId); if(k){ k.points += (c.pts != null ? c.pts : tsk.points); } }
  save();
}
function reject(compId){
  state.completions = state.completions.filter(x=>x.id!==compId);
  save();
}
/* Approbation d'une complétion de mission extrême partagée (compétitif / collabore) */
function approveExtremeComp(compId, finish){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId); if(!tsk) return;
  c.status = "approved"; c.approvedAt = Date.now();
  const k = child(c.childId); if(k){ k.points += (c.pts != null ? c.pts : tsk.points); }
  if(tsk.extremeMode === "competitive"){
    /* remporté : ferme pour tous, retire les autres complétions en attente */
    closeExtreme(tsk);
    const pk = taskPK(tsk);
    state.completions = state.completions.filter(x =>
      !(x.taskId===tsk.id && x.periodKey===pk && x.id!==c.id && x.status!=="approved")
    );
  } else if(tsk.extremeMode === "collab" && finish){
    /* approuvé & terminé : ferme pour tous, mais garde les complétions déjà en attente */
    closeExtreme(tsk);
  }
  save();
}
/* Refus d'une mission extrême avec pénalité optionnelle (bombe) */
function rejectExtremeConfirm(compId, penalty){
  const c = state.completions.find(x=>x.id===compId); if(!c) return;
  const tsk = task(c.taskId);
  const k = tsk ? child(c.childId) : null;
  state.completions = state.completions.filter(x=>x.id!==compId);
  if(tsk && k && penalty >= 1){
    applyEvent("bomb", tsk.title + " : " + t("notDoneSuffix"), penalty, [k.id]);
  } else {
    save();
  }
}
function buy(rewardId, childId){
  const r = reward(rewardId); const k = child(childId);
  if(!r||!k) return false;
  if(k.points < r.cost) return false;
  k.points -= r.cost;
  if(!state.purchases) state.purchases = [];
  state.purchases.unshift({id:uid(), rewardId:r.id, childId:k.id, childName:k.name, title:r.title, emoji:r.emoji||"🎁", cost:r.cost, status:"pending", createdAt:Date.now()});
  save();
  return true;
}
function adjustPoints(childId, delta){
  const k = child(childId); if(!k) return;
  k.points = Math.max(0, k.points + delta);
  save();
}
function deleteChild(id){
  state.children = state.children.filter(c=>c.id!==id);
  /* retire l'enfant des missions partagées ; supprime la mission si plus aucun enfant */
  state.tasks.forEach(tk=>{ if(tk.childIds) tk.childIds = tk.childIds.filter(x=>x!==id); });
  state.tasks = state.tasks.filter(tk=> tk.childIds ? tk.childIds.length>0 : tk.childId!==id);
  state.completions = state.completions.filter(c=>c.childId!==id);
  state.purchases = state.purchases.filter(p=>p.childId!==id);
  save();
}

/* delta signé d'une notification (rétrocompat si delta absent) */
function notifDelta(n){ return n.delta !== undefined ? n.delta : ((n.type==="powerup"||n.type==="investment") ? n.points : -n.points); }

/* points à afficher sur l'écran d'accueil avant que l'enfant ait vu l'animation */
function lockDisplayPts(c){
  const unviewed = (state.notifications||[]).filter(n => n.childId === c.id && !n.viewedAt);
  const pending  = unviewed.reduce((s, n) => s + notifDelta(n), 0);
  return Math.max(0, c.points - pending);
}

        const hasPending = (state.notifications||[]).some(n => n.childId===c.id && !n.viewedAt);
        return `
        <button class="who" data-action="open-child" data-id="${c.id}" style="border-color:${c.color}">
          ${hasPending ? `<div class="ev-q">!</div>` : ""}
          <div class="face">${esc(c.emoji)}</div>
          <div class="nm" style="color:${c.color}">${esc(c.name)}</div>
          <div class="pts">${coinPill(lockDisplayPts(c))}</div>
        </button>`;
      }).join("")}
    </div>
    <button class="parent-btn" data-action="open-parent">${t("parentBtn")}</button>
    <p class="footer-note">${t("lockTip")}<br><span style="opacity:.5;font-size:10px">${APP_VERSION}</span></p>
    <div style="display:flex;justify-content:center;gap:10px;margin-top:18px">
      <button class="lang-btn" data-action="refresh-app" title="Actualiser">🔄</button>
      <button class="lang-btn" data-action="toggle-lang">${state.lang==="fr"?"🇫🇷 FR":"🇬🇧 EN"}</button>
    </div>
  `;
}

/* ----- Écran enfant ----- */
function renderRewardHistory(c){
  const now = Date.now(), H24 = 864e5;
  const items = (state.purchases||[]).filter(p => {
    if(!p.status) return false; /* old purchases without status */
    if(p.childId !== c.id) return false;
    if(p.status==="given"    && p.givenAt    && (now-p.givenAt)   >H24) return false;
    if(p.status==="refused"  && p.refusedAt  && (now-p.refusedAt) >H24) return false;
    return true;
  });
  if(items.length===0) return "";
  return items.map(p=>{
    let chip="", sub="", cancelBtn="";
    if(p.status==="pending"){
      chip=`<span class="tag" style="background:#FFF4D6;color:#a06d00;font-size:12px">${t("purchasePending")}</span>`;
      cancelBtn=`<button class="btn btn-ghost" style="font-size:12px;padding:5px 12px;margin-top:6px" data-action="cancel-purchase" data-id="${p.id}">${t("btnCancel")}</button>`;
    } else if(p.status==="approved"){
      chip=`<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:12px">${t("purchaseApproved")}</span>`;
      sub=`<div style="font-size:11px;font-weight:700;color:#1d8a55;margin-top:2px">${t("purchaseApprovedSub")}</div>`;
    } else if(p.status==="given"){
      chip=`<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:12px">${t("purchaseGiven")}</span>`;
    } else if(p.status==="refused"){
      chip=`<span class="tag" style="background:#FCE9E9;color:#c0392b;font-size:12px">${t("purchaseRefused")}</span>`;
    }
    const displayCost = p.status==="refused" ? 0 : p.cost;
    return `
      <div style="display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--line)">
        <span style="font-size:22px;flex-shrink:0">${esc(p.emoji||"🎁")}</span>
        <div class="grow">
          <div style="font-weight:700;font-size:14px">${esc(p.title)}</div>
          <div class="muted" style="font-size:12px">${displayCost} pts</div>
          ${cancelBtn}
        </div>
        <div style="flex-shrink:0;text-align:right">${chip}${sub}</div>
      </div>`;
  }).join("");
}

function showRefundAnim(pts){
  const ptsEl = document.getElementById("pts-val");
  if(!ptsEl) return;
  const rect = ptsEl.getBoundingClientRect();
  const badge = document.createElement("span");
  badge.textContent = "+" + pts;
  badge.style.cssText = `position:fixed;left:${Math.round(rect.left)}px;top:${Math.round(rect.top)}px;z-index:600;pointer-events:none;font-weight:900;font-size:24px;color:#2BB673;animation:ev-pts-float 1.5s ease-out forwards`;
  document.body.appendChild(badge);
  setTimeout(()=>badge.remove(), 1600);
  const k = child(view.childId);
  if(k && ptsEl) setTimeout(()=>{ ptsEl.textContent = k.points; }, 200);
}

function cleanupPurchases(){
  const now=Date.now(), H24=864e5, before=(state.purchases||[]).length;
  state.purchases=(state.purchases||[]).filter(p=>{
    if(p.status==="given"   && p.givenAt   && (now-p.givenAt)  >H24) return false;
    if(p.status==="refused" && p.refusedAt && (now-p.refusedAt)>H24) return false;
    return true;
  });
  if((state.purchases||[]).length!==before) save();
}

function renderChild(){
  const c = child(view.childId);
  const myTasks = state.tasks.filter(tsk => taskChildIds(tsk).includes(c.id));

  /* --- notification lifecycle --- */
  const nowMs = Date.now();
  const THIRTY_MIN = 30 * 60 * 1000;
  const beforeLen = (state.notifications||[]).length;
  state.notifications = (state.notifications||[]).filter(n =>
    n.childId !== c.id || !n.viewedAt || (nowMs - n.viewedAt) < THIRTY_MIN
  );
  const myNotifs    = (state.notifications||[]).filter(n => n.childId === c.id);
  const newlyViewed = myNotifs.filter(n => !n.viewedAt);

  /* capturer displayPts AVANT de poser viewedAt : lockDisplayPts soustrait les deltas
     des notifications non vues, donnant la valeur "avant animation" correcte */
  const displayPts = lockDisplayPts(c);

  newlyViewed.forEach(n => { n.viewedAt = nowMs; });
  if(newlyViewed.length > 0 || state.notifications.length !== beforeLen) save();

  /* events panel — bonuses first, bombs second */
  const sortedNotifs = [...myNotifs].sort((a,b)=>{
    const aPos = (a.type==="powerup"||a.type==="investment") ? 0 : 1;
    const bPos = (b.type==="powerup"||b.type==="investment") ? 0 : 1;
    return aPos!==bPos ? aPos-bPos : b.createdAt-a.createdAt;
  });
  const evPanel = sortedNotifs.length === 0 ? "" : `
    <div style="margin:0 0 10px;background:#fff;border-radius:18px;padding:14px 18px;box-shadow:var(--shadow)">
      <div style="font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px">${state.lang==="fr"?"Événements":"Events"}</div>
      ${sortedNotifs.map((n,i)=>`
        <div style="display:flex;align-items:center;gap:10px;padding:7px 0${i<sortedNotifs.length-1?";border-bottom:1px solid var(--line)":""}">
          <span style="font-size:18px">${n.type==="powerup"?"⚡":n.type==="investment"?"💰":"💣"}</span>
          <div style="flex:1;font-weight:700;font-size:15px">${esc(n.title)}</div>
          <span style="font-weight:900;font-size:16px;color:${(n.type==="powerup"||n.type==="investment")?"#2BB673":"#E74C3C"}">${(n.type==="powerup"||n.type==="investment")?"+":"-"}${n.points}</span>
        </div>`).join("")}
    </div>`;

  const now = new Date();
  const nowStr = pad(now.getHours()) + ":" + pad(now.getMinutes());

  /* period status: past / current / upcoming */
  function pStatus(p){
    if(!p || p.isAllDay) return "current";
    if(nowStr < p.startTime) return "upcoming";
    if(nowStr > p.endTime)   return "past";
    return "current";
  }

  /* sorted display periods */
  const allPeriods  = state.periods || [];
  const alldayP     = allPeriods.find(p => p.isAllDay);
  const otherPs     = allPeriods
    .filter(p => !p.isAllDay && p.active)
    .sort((a, b) => a.startTime.localeCompare(b.startTime));
  const displayPeriods = [alldayP, ...otherPs].filter(Boolean);

  /* mission hebdo « toute la journée » (non extrême) → boîte Semaine en haut */
  function isWeekBoxTask(tsk){
    if(tsk.freq!=="weekly" || isExtreme(tsk)) return false;
    const p = allPeriods.find(x => x.id === tsk.periodId);
    return !tsk.periodId || tsk.periodId==="allday" || !p || p.isAllDay;
  }

  /* for carry-over: find period covering nowStr, else allday */
  function carryTargetId(){
    const hit = otherPs.find(p => nowStr >= p.startTime && nowStr <= p.endTime);
    return hit ? hit.id : (alldayP ? alldayP.id : null);
  }

  /* build display map: periodId → [{tsk, carried, greyed}] */
  const displayMap = {};
  displayPeriods.forEach(p => { displayMap[p.id] = []; });

  function addToMap(pid, entry){
    if(pid && displayMap[pid] !== undefined) displayMap[pid].push(entry);
    else if(alldayP) displayMap[alldayP.id].push(entry);
  }

  const todayDow = new Date().getDay(); /* 0=Sun, 6=Sat */
  myTasks.forEach(tsk => {
    const st  = taskStatusFor(tsk, c.id);
    if(isWeekBoxTask(tsk)) return; /* rendu dans la boîte Semaine */
    if(isMonthBoxTask(tsk)) return; /* rendu dans la boîte Mois */
    if(tsk.freq === "weekly"  && !weekShow(tsk, c.id))  return;
    if(tsk.freq === "monthly" && !monthShow(tsk, c.id)) return;
    if(tsk.freq === "once" && st === "done") return;
    if(tsk.freq === "weekdays" && (todayDow===0||todayDow===6)) return;
    if(tsk.freq === "calendar" && !(tsk.calDates||[]).includes(todayStr())) return;
    const ex = isExtreme(tsk);
    /* mission extrême "une seule fois" déjà remportée : disparaît complètement sauf si l'enfant a une approbation en attente */
    if(tsk.freq === "once" && ex && isExtremeClosed(tsk) && st !== "pending") return;

    const pid = tsk.periodId || (alldayP ? alldayP.id : null);
    const p   = allPeriods.find(x => x.id === pid);
    const status = pStatus(p);

    if(status !== "past" || !p || p.isAllDay){
      addToMap(pid, {tsk, carried:false, greyed:false, ex});
    } else if(tsk.carryOn && st === "open"){
      /* carry to period covering current time */
      addToMap(carryTargetId(), {tsk, carried:true, greyed:false, ex});
    } else {
      /* stay in past period — greyed */
      addToMap(pid, {tsk, carried:false, greyed:true, ex});
    }
  });

  /* render */
  let sections = "";
  let anyVisible = false;

  /* Boîte « Semaine » : missions hebdo toute la journée, en haut */
  const weekBoxTasks = myTasks.filter(tsk=>isWeekBoxTask(tsk) && weekShow(tsk, c.id)).sort((a,b)=>a.createdAt-b.createdAt);
  if(weekBoxTasks.length){
    anyVisible = true;
    let rows = "";
    weekBoxTasks.forEach(tsk => {
      const st = taskStatusFor(tsk, c.id);
      const isPushed = isPushedTomorrow(tsk, c.id);
      let action;
      if(view.childEditMode && st==="skipped"){
        action = `<button class="do" style="background:#ddd;color:#888;font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skipped")}</button>`;
      } else if(view.childEditMode && st==="open"){
        action = `<div style="display:flex;flex-direction:column;gap:4px">
          <button class="do" style="background:var(--line);color:var(--ink-soft);font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skip")}</button>
          <button class="do" style="background:${isPushed?"#ddd":"var(--line)"};color:${isPushed?"#888":"var(--ink-soft)"};font-size:11px;font-weight:700;white-space:normal;text-align:center;line-height:1.2;padding:6px 8px" data-action="push-task" data-id="${tsk.id}">${isPushed?t("pushedTomorrow"):t("pushTomorrow")}</button>
        </div>`;
      } else if(st==="skipped"){
        action = statusChip("status-chip", `✗ ${t("skipped")}`);
      } else if(isPushed){
        action = statusChip("status-chip", `↷ ${t("pushedTomorrow")}`);
      } else {
        action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        if(st==="pending") action = `<button class="do waiting" data-action="undo-task" data-id="${tsk.id}">${t("statusPending")}</button>`;
        if(st==="done")    action = statusChip("done-chip", t("statusDone"));
      }
      rows += `
        <div class="task" id="tc-${tsk.id}" style="${(st==="skipped"||isPushed)?"opacity:.4":""}">
          <span class="pts-badge" style="font-size:14px">+${tsk.points}</span>
          <div class="meta">
            <div class="t">${esc(tsk.title)}</div>
            <div class="f" style="color:var(--ink-soft);font-size:12px">${weekValueLabel(tsk)}</div>
          </div>
          ${action}
        </div>`;
    });
    sections += `
      <div class="section-h" style="margin:6px 4px 12px">
        <span style="font-size:22px;line-height:1">🗓️</span>
        <h3 style="font-size:16px;color:var(--ink)">${t("wkBoxTitle")}</h3>
      </div>${rows}`;
  }

  /* Boîte « Mois » : missions mensuelles toute la journée, en haut */
  const monthBoxTasks = myTasks.filter(tsk=>isMonthBoxTask(tsk) && monthShow(tsk, c.id)).sort((a,b)=>a.createdAt-b.createdAt);
  if(monthBoxTasks.length){
    anyVisible = true;
    let rows = "";
    monthBoxTasks.forEach(tsk => {
      const st = taskStatusFor(tsk, c.id);
      const isPushed = isPushedTomorrow(tsk, c.id);
      let action;
      if(view.childEditMode && st==="skipped"){
        action = `<button class="do" style="background:#ddd;color:#888;font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skipped")}</button>`;
      } else if(view.childEditMode && st==="open"){
        action = `<div style="display:flex;flex-direction:column;gap:4px">
          <button class="do" style="background:var(--line);color:var(--ink-soft);font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skip")}</button>
          <button class="do" style="background:${isPushed?"#ddd":"var(--line)"};color:${isPushed?"#888":"var(--ink-soft)"};font-size:11px;font-weight:700;white-space:normal;text-align:center;line-height:1.2;padding:6px 8px" data-action="push-task" data-id="${tsk.id}">${isPushed?t("pushedTomorrow"):t("pushTomorrow")}</button>
        </div>`;
      } else if(st==="skipped"){
        action = statusChip("status-chip", `✗ ${t("skipped")}`);
      } else if(isPushed){
        action = statusChip("status-chip", `↷ ${t("pushedTomorrow")}`);
      } else {
        action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        if(st==="pending") action = `<button class="do waiting" data-action="undo-task" data-id="${tsk.id}">${t("statusPending")}</button>`;
        if(st==="done")    action = statusChip("done-chip", t("statusDone"));
      }
      rows += `
        <div class="task" id="tc-${tsk.id}" style="${(st==="skipped"||isPushed)?"opacity:.4":""}">
          <span class="pts-badge" style="font-size:14px">+${tsk.points}</span>
          <div class="meta">
            <div class="t">📅 ${esc(tsk.title)}</div>
            <div class="f" style="color:var(--ink-soft);font-size:12px">${monthValueLabel(tsk)}</div>
          </div>
          ${action}
        </div>`;
    });
    sections += `
      <div class="section-h" style="margin:6px 4px 12px">
        <span style="font-size:22px;line-height:1">📅</span>
        <h3 style="font-size:16px;color:var(--ink)">${t("mthBoxTitle")}</h3>
      </div>${rows}`;
  }

  /* inject tasks pushed from yesterday that don't appear naturally today */
  const yStr = yesterdayStr();
  (state.pushes||[]).filter(pr => pr.pushedDate === yStr).forEach(pr => {
    const tsk = task(pr.taskId); if(!tsk) return;
    if(!taskChildIds(tsk).includes(c.id)) return;
    const alreadyVisible =
      Object.values(displayMap).some(a => a.some(x => x.tsk.id === tsk.id)) ||
      weekBoxTasks.some(t => t.id === tsk.id) ||
      monthBoxTasks.some(t => t.id === tsk.id);
    if(!alreadyVisible){
      const pid = tsk.periodId || (alldayP ? alldayP.id : null);
      addToMap(pid, {tsk, carried:false, greyed:false, ex:isExtreme(tsk)});
    }
  });

  displayPeriods.forEach(p => {
    const items = displayMap[p.id] || [];
    if(items.length === 0) return;
    anyVisible = true;

    const status   = pStatus(p);
    const isPast   = status === "past";
    const isCurrent= status === "current";
    const pName    = p.isAllDay ? t("allDayLabel") : p.name;
    const timeLabel= p.isAllDay ? t("allDayTime") : `${p.startTime} – ${p.endTime}`;

    const hdrMargin= isPast ? "margin:14px 4px 8px" : "margin:22px 4px 12px";
    const h3Style  = isPast ? "font-size:13px;color:var(--ink-soft)" : "font-size:16px;color:var(--ink)";
    const tagStyle = isPast ? "opacity:.5;font-size:11px" : "";
    const badge    = isPast
      ? `<span class="tag" style="background:var(--line);color:var(--ink-soft);font-size:11px">✓ ${t("periodPast")}</span>`
      : isCurrent
        ? `<span class="tag" style="background:#E6F7EE;color:#1d8a55;font-size:11px">● ${t("periodCurrent")}</span>`
        : `<span class="tag" style="background:#FFF4D6;color:#a06d00;font-size:11px">⏰ ${t("periodUpcoming")}</span>`;

    sections += `
      <div class="section-h" style="${hdrMargin}">
        <span style="font-size:${isPast?"18px":"22px"};line-height:1">${esc(p.emoji||"")}</span>
        <h3 style="${h3Style}">${esc(pName)}</h3>
        <span class="tag" style="${tagStyle}">${timeLabel}</span>
        ${badge}
      </div>`;

    /* missions extrêmes (surplus) en dernier dans la période */
    items.sort((a,b)=> (a.ex?1:0) - (b.ex?1:0));

    items.forEach(({tsk, carried, greyed, ex}) => {
      const st = taskStatusFor(tsk, c.id);

      if(ex){
        const naturallyUnlocked = extremeUnlocked(tsk, c.id);
        const exPk = taskPK(tsk);
        const isForceUnlocked = !!(state.forceUnlocked && state.forceUnlocked.some(x=>x.taskId===tsk.id && x.childId===c.id && x.unlockedDate===todayStr()));
        const unlocked = naturallyUnlocked || isForceUnlocked;
        const closed   = isExtremeClosed(tsk);
        const modeEmoji= extremeEmoji(tsk);
        const isPushedEx = isPushedTomorrow(tsk, c.id);
        const exSkipBtn = (skLbl) => `<button class="do" style="background:${skLbl===t("skipped")?"#ddd":"var(--line)"};color:${skLbl===t("skipped")?"#888":"var(--ink-soft)"};font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${skLbl}</button>`;
        const exPushBtn = (pushed) => `<button class="do" style="background:${pushed?"#ddd":"var(--line)"};color:${pushed?"#888":"var(--ink-soft)"};font-size:11px;font-weight:700;white-space:normal;text-align:center;line-height:1.2;padding:6px 8px" data-action="push-task" data-id="${tsk.id}">${pushed?t("pushedTomorrow"):t("pushTomorrow")}</button>`;
        const lockToggleBtn = (forced) => `<button class="do" style="background:${forced?"#E6F7EE":"var(--line)"};font-size:14px;padding:6px 8px" data-action="toggle-extreme-lock" data-id="${tsk.id}">${forced?"🔓":"🔒"}</button>`;
        let action, locked=false;
        if(st === "done"){
          action = statusChip("done-chip", t("statusDone"));
        } else if(st === "pending"){
          const pendingLabel = tsk.extremeMode==="all"
            ? (allModeReady(tsk) ? t("statusWaitApproval") : t("statusWaitOthers"))
            : t("statusPending");
          action = `<button class="do waiting" data-action="undo-task" data-id="${tsk.id}">${pendingLabel}</button>`;
        } else if(st === "skipped"){
          action = view.childEditMode
            ? `<div style="display:flex;flex-direction:column;gap:4px">${exSkipBtn(t("skipped"))}${exPushBtn(false)}</div>`
            : statusChip("status-chip", `✗ ${t("skipped")}`);
        } else if(isPushedEx){
          action = view.childEditMode
            ? `<div style="display:flex;flex-direction:column;gap:4px">${exSkipBtn(t("skip"))}${exPushBtn(true)}</div>`
            : statusChip("status-chip", `↷ ${t("pushedTomorrow")}`);
        } else if(closed){
          action = statusChip("status-chip", t("extremeWon"));
          locked = true;
        } else if(!naturallyUnlocked){
          /* locked (conditions not met) — may be force-unlocked */
          if(view.childEditMode){
            action = `<div style="display:flex;flex-direction:column;gap:4px">${lockToggleBtn(isForceUnlocked)}${exSkipBtn(t("skip"))}${exPushBtn(false)}</div>`;
            /* no opacity in editMode */
          } else if(isForceUnlocked){
            action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
          } else {
            action = `<span style="font-size:16px;padding:6px 10px;background:var(--line);border-radius:10px">🔒</span>`;
            locked = true;
          }
        } else if(view.childEditMode){
          action = `<div style="display:flex;flex-direction:column;gap:4px">${exSkipBtn(t("skip"))}${exPushBtn(false)}</div>`;
        } else {
          action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        }
        const wrapStyle = (st==="skipped"||isPushedEx)
          ? "opacity:.4;border:2px dashed var(--line);border-radius:16px"
          : locked
            ? "opacity:.55;border:2px dashed var(--line);border-radius:16px"
            : "border:2px solid #FFCF5C;background:linear-gradient(135deg,#FFF9E9,#FFF1CC);border-radius:16px";
        /* compteur X/N pour mode Tous */
        let allCounter = "";
        if(tsk.extremeMode === "all"){
          const ids = taskChildIds(tsk);
          const done = ids.filter(cid =>
            state.completions.some(x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===exPk)
          ).length;
          allCounter = ` · <b>${done}/${ids.length}</b>`;
        }
        const subLine = (!unlocked && !closed && st==="open" && !isPushedEx)
          ? `${t("extremeSurplus")}${allCounter} · ${t("extremeLocked")}`
          : `${t("extremeSurplus")}${allCounter}`;
        sections += `
          <div class="task" id="tc-${tsk.id}" style="${wrapStyle}">
            <span class="pts-badge" style="background:#FFB020;color:#4a2d00">+${tsk.points}</span>
            <div class="meta">
              <div class="t">${modeEmoji} ${esc(tsk.title)}</div>
              <div class="f" style="font-size:12px;color:#a06d00;font-weight:800">${subLine}</div>
            </div>
            ${action}
          </div>`;
        return;
      }

      const isPushed = isPushedTomorrow(tsk, c.id);
      let action;
      if(view.childEditMode && st === "skipped"){
        action = `<button class="do" style="background:#ddd;color:#888;font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skipped")}</button>`;
      } else if(view.childEditMode && st === "open" && !greyed){
        action = `<div style="display:flex;flex-direction:column;gap:4px">
          <button class="do" style="background:var(--line);color:var(--ink-soft);font-size:12px;font-weight:700" data-action="skip-task" data-id="${tsk.id}">${t("skip")}</button>
          <button class="do" style="background:${isPushed?"#ddd":"var(--line)"};color:${isPushed?"#888":"var(--ink-soft)"};font-size:11px;font-weight:700;white-space:normal;text-align:center;line-height:1.2;padding:6px 8px" data-action="push-task" data-id="${tsk.id}">${isPushed?t("pushedTomorrow"):t("pushTomorrow")}</button>
        </div>`;
      } else if(st === "skipped"){
        action = statusChip("status-chip", `✗ ${t("skipped")}`);
      } else if(isPushed){
        action = statusChip("status-chip", `↷ ${t("pushedTomorrow")}`);
      } else if(greyed && st === "open"){
        action = `<span style="font-size:12px;font-weight:700;color:var(--ink-soft);padding:6px 10px;background:var(--line);border-radius:10px">—</span>`;
      } else {
        action = `<button class="do" data-action="do-task" data-id="${tsk.id}">${t("btnDone")}</button>`;
        if(st === "pending") action = `<button class="do waiting" data-action="undo-task" data-id="${tsk.id}">${t("statusPending")}</button>`;
        if(st === "done")    action = statusChip("done-chip", t("statusDone"));
      }

      const wrapStyle = [
        (greyed || st === "skipped" || isPushed) ? "opacity:.4" : "",
        carried ? "border-left:3px solid var(--wait);padding-left:13px" : "",
      ].filter(Boolean).join(";");

      /* badge avec réduction de report éventuelle */
      const cpKey2 = `${tsk.id}|${c.id}`;
      const adjPts2 = (state.carryPenalties && state.carryPenalties[cpKey2] != null)
        ? state.carryPenalties[cpKey2] : null;
      const ptsBadge = adjPts2 != null
        ? `<span style="display:flex;flex-direction:column;align-items:center;gap:1px">
             <span class="pts-badge" style="font-size:11px;opacity:.55;text-decoration:line-through;padding:3px 8px">+${tsk.points}</span>
             <span class="pts-badge" style="background:#FFDAD6;color:#c0392b;font-size:14px">+${adjPts2}</span>
           </span>`
        : `<span class="pts-badge" style="font-size:${greyed?"12px":"14px"}">${greyed?"":"+"}${tsk.points}</span>`;

      sections += `
        <div class="task" id="tc-${tsk.id}" style="${wrapStyle}">
          ${ptsBadge}
          <div class="meta">
            <div class="t" style="${greyed?"font-size:14px":""}">${isWeekTask(tsk)?"🗓️ ":isMonthTask(tsk)?"📅 ":""}${esc(tsk.title)}</div>
            ${isWeekTask(tsk)  ? `<div class="f" style="color:var(--ink-soft);font-size:12px">${weekValueLabel(tsk)}</div>`  : ""}
            ${isMonthTask(tsk) ? `<div class="f" style="color:var(--ink-soft);font-size:12px">${monthValueLabel(tsk)}</div>` : ""}
            ${carried ? `<div class="f" style="color:var(--wait);font-size:12px">↩ ${t("carriedOver")}</div>` : ""}
          </div>
          ${action}
        </div>`;
    });
  });

  if(state.paused){
    sections = `<div class="card" style="text-align:center;padding:36px 20px;border:2px dashed #F59E0B;background:linear-gradient(135deg,#FFFBEB,#FEF3C7)">
      <div style="font-size:52px;margin-bottom:12px">🏖️</div>
      <div style="font-weight:800;font-size:20px;margin-bottom:6px;color:#92400E">${t("pauseChildBanner")}</div>
      <div class="muted">${t("pauseChildSub")}</div>
    </div>`;
  } else if(!anyVisible){
    sections = `<div class="empty"><span class="em">🗒️</span>${t("noTasks")}</div>`;
  }

  app().innerHTML = `
    <div class="top">
      <button class="back" data-action="lock">‹</button>
      <div class="who-name" style="color:${c.color};flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(c.emoji)} ${esc(c.name)}</div>
      ${view.childEditMode ? `
        <button class="btn btn-yes" style="font-size:13px;padding:8px 14px;flex-shrink:0" data-action="child-edit-done">${t("parentalDone")}</button>
      ` : `
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0">
          <button class="icon-btn" style="font-size:18px" data-action="child-edit-self" data-id="${c.id}">✏️</button>
          <button class="icon-btn" style="font-size:18px" data-action="child-edit-gear" data-id="${c.id}">⚙️</button>
        </div>
      `}
    </div>
    <div class="hero" style="background:linear-gradient(135deg, ${c.color}, ${shade(c.color,-18)})">
      <span class="emoji">${esc(c.emoji)}</span>
      <div class="label">${t("myPoints")}</div>
      <div class="big"><span class="c"></span><span id="pts-val">${displayPts}</span></div>
      <div class="sub">${t("heroSub")}</div>
    </div>
    ${view.childEditMode ? `
      <div class="parental-edit-panel" style="margin-bottom:10px">
        <button class="add-btn" data-action="add-task-child" data-id="${c.id}">${t("addTask")}</button>
      </div>
    ` : ""}
    <button class="add-btn" data-action="open-store" data-id="${c.id}">${t("shopBtn")}</button>
    <div id="reward-hist-${c.id}">${renderRewardHistory(c)}</div>
    ${evPanel}
    ${sections}
  `;

  /* play animation then update the counter display */
  let runningPts = displayPts;
  newlyViewed.forEach((notif, i) => {
    const startAt  = 400 + i * 2900;
    /* powerup badge: delay 0.15s + 1.8s = ~2s; bomb badge: delay 1.15s + 1.8s = ~3s */
    const updateAt = startAt + ((notif.type==="powerup"||notif.type==="investment") ? 1550 : 2550);

    setTimeout(() => {
      if(notif.type==="powerup"){ showPowerUpAnim(c.color, notif.points, notif.title); playPowerUpSound(); }
      else if(notif.type==="investment"){ showPowerUpAnim(c.color, notif.points, notif.title); playInvestmentSound(); }
      else { showBombAnim(notif.points, notif.title); playBombSound(); }
    }, startAt);

    setTimeout(() => {
      runningPts = Math.max(0, runningPts + notifDelta(notif));
      const pv = document.getElementById("pts-val");
      if(pv){
        pv.style.transition = "transform .25s ease";
        pv.style.transform  = "scale(1.3)";
        pv.textContent = runningPts;
        setTimeout(() => { pv.style.transform = "scale(1)"; }, 220);
      }
    }, updateAt);
  });
}

  const pb = document.getElementById("parent-body");

  const tab = view.tab;
  let body = "";
  if(tab==="approbations") body = parentApprovals();
  else if(tab==="taches")     body = parentTasks();

  else if(tab==="boutique")   body = parentRewards();

/* mission « Tous » : prête à approuver seulement quand tous les enfants ciblés ont marqué terminé */
function allModeReady(tsk){
  const pk = taskPK(tsk);
  const ids = taskChildIds(tsk);
  return ids.length>0 && ids.every(cid =>
    state.completions.some(x=>x.taskId===tsk.id && x.childId===cid && x.periodKey===pk));
}

function parentApprovals(){
  const fs = freqShort();
  const pend = state.completions.filter(c=>c.status==="pending").sort((a,b)=>a.createdAt-b.createdAt);
  const visible = pend.filter(c=>{
    const tsk = task(c.taskId);
    if(tsk && isExtreme(tsk) && tsk.extremeMode==="all") return allModeReady(tsk);
    return true;
  });

  /* purchases section — pending + approved (waiting for "mark given") */
  const pendingPurchases = (state.purchases||[]).filter(p=>p.status==="pending"||p.status==="approved").sort((a,b)=>a.createdAt-b.createdAt);
  let purchasesHtml = "";
  if(pendingPurchases.length > 0){
    purchasesHtml = `
      <div style="font-weight:700;font-size:13px;color:var(--ink-soft);margin:12px 0 6px">${t("sectionPurchases")}</div>
      ${pendingPurchases.map(p=>{
        const k = child(p.childId);
        const approvedState = p.status === "approved";
        const buttons = approvedState
          ? `<button class="btn" style="width:100%;margin-top:6px;background:var(--ink);color:#fff;font-size:13px" data-action="mark-given" data-id="${p.id}">${t("btnMarkGiven")}</button>`
          : `<div class="btn-line" style="margin-top:6px">
               <button class="btn btn-yes" style="font-size:13px" data-action="approve-purchase" data-id="${p.id}">${t("btnApprovePurchase")}</button>
               <button class="btn btn-no" style="font-size:13px" data-action="refuse-purchase" data-id="${p.id}">${t("btnRefusePurchase")}</button>
             </div>`;
        return `
          <div class="card approve-card">
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:26px;flex-shrink:0">${esc(p.emoji||"🎁")}</span>
              <div class="grow">
                <div style="font-weight:700;font-size:15px">${esc(p.title)}</div>
                <div class="muted" style="font-size:12px">${k ? `${esc(k.emoji)} ${esc(k.name)}` : esc(p.childName||"")} · ${p.cost} pts</div>
              </div>
            </div>
            ${buttons}
          </div>`;
      }).join("")}`;
  }

  if(visible.length===0 && pendingPurchases.length===0){
    return `<div class="empty"><span class="em">✅</span>${t("noApprovals")}</div>`;
  }
  return purchasesHtml + visible.map(c=>approvalCard(c, fs)).join("");
}

function fmtCompletedAt(ts){
  if(!ts) return "";
  const d = new Date(ts);
  const isFR = state.lang !== "en";
  return isFR
    ? `Le ${d.getDate()} à ${pad(d.getHours())}:${pad(d.getMinutes())}`
    : `On ${d.getDate()} at ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}
function approvalCard(c, fs){
  const tsk = task(c.taskId); const k = child(c.childId);
  if(!tsk||!k) return "";
  const ex = isExtreme(tsk);
  const modeTag = ex ? `<span class="muted">${extremeEmoji(tsk)} ${t("typeExtreme")}</span>` : "";
  /* points effectifs pour cette complétion (réduits si carry penalty) */
  const effPts = c.pts != null ? c.pts : tsk.points;
  const ptsDisplay = effPts < tsk.points
    ? `<span style="display:flex;flex-direction:column;align-items:flex-end;gap:1px">
         <span class="pts-badge" style="font-size:11px;opacity:.55;text-decoration:line-through;padding:3px 8px">+${tsk.points}</span>
         <span class="pts-badge" style="background:#FFDAD6;color:#c0392b">+${effPts}</span>
       </span>`
    : `<span class="pts-badge">+${effPts}</span>`;

  let buttons;
  if(rejectingComp === c.id){
    buttons = `
      <div style="width:100%;margin-top:6px">
        <label class="fld">${t("rejectPenaltyLabel")}</label>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-weight:900;font-size:20px;color:#c0392b">−</span>
          <input class="in" id="rej-pen-${c.id}" type="number" inputmode="numeric" min="0" value="0" style="flex:1">
          <span style="font-weight:700;color:var(--ink-soft)">pts</span>
        </div>
        <div class="btn-line" style="margin-top:8px">
          <button class="btn btn-ghost" data-action="rej-ext-cancel">${t("btnCancel")}</button>
          <button class="btn btn-no" data-action="rej-ext-confirm" data-id="${c.id}">${t("btnConfirmReject")}</button>
        </div>
      </div>`;
  } else if(ex && tsk.extremeMode==="collab"){
    buttons = `
      <div class="btn-line">
        <button class="btn btn-yes" data-action="appr-ext-keep" data-id="${c.id}">${t("btnApproveKeep")} (+${effPts})</button>
        <button class="btn btn-no" data-action="rej-ext-start" data-id="${c.id}">${t("btnReject")}</button>
      </div>
      <button class="btn btn-yes" data-action="appr-ext-finish" data-id="${c.id}" style="width:100%;margin-top:6px;background:#1d8a55">${t("btnApproveFinish")}</button>`;
  } else if(ex && tsk.extremeMode==="competitive"){
    buttons = `
      <div class="btn-line">
        <button class="btn btn-yes" data-action="appr-ext-keep" data-id="${c.id}">${t("btnApprove",{pts:effPts})}</button>
        <button class="btn btn-no" data-action="rej-ext-start" data-id="${c.id}">${t("btnReject")}</button>
      </div>`;
  } else if(ex){
    /* solo ou tous : approbation standard + refus avec pénalité */
    buttons = `
      <div class="btn-line">
        <button class="btn btn-yes" data-action="approve" data-id="${c.id}">${t("btnApprove",{pts:effPts})}</button>
        <button class="btn btn-no" data-action="rej-ext-start" data-id="${c.id}">${t("btnReject")}</button>
      </div>`;
  } else {
    buttons = `
      <div class="btn-line">
        <button class="btn btn-yes" data-action="approve" data-id="${c.id}">${t("btnApprove",{pts:effPts})}</button>
        <button class="btn btn-no" data-action="reject" data-id="${c.id}">${t("btnReject")}</button>
      </div>`;
  }

  return `
    <div class="card approve-card">
      <div class="who-line">
        <span class="who-chip" style="background:${k.color}">${esc(k.emoji)} ${esc(k.name)}</span>
        <span class="muted">${fs[tsk.freq]}</span>
        ${modeTag}
      </div>
      <div class="row">
        <div class="grow"><div class="t" style="font-weight:800;font-size:17px">${ex?extremeEmoji(tsk)+" ":""}${esc(tsk.title)}<span style="font-size:12px;font-weight:500;color:var(--ink-soft);margin-left:8px;white-space:nowrap">${fmtCompletedAt(c.createdAt)}</span></div></div>
        ${ptsDisplay}
      </div>
      ${buttons}
    </div>`;
}

    tplContent = state.templates.length===0
      ? `<div class="muted">${t("quickTemplatesHint")}</div>`

        <div class="tpl-row" data-tpl-idx="${idx}" style="display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line)">

            <div class="drag-lines"><b></b><b></b><b></b></div>
          </button>
          <div class="grow" style="font-weight:700">${esc(tsk.title)} <span class="muted">+${tsk.points}</span></div>

          <button class="icon-btn" style="font-size:17px" data-action="del-tpl" data-idx="${idx}">✕</button>

    tplContent = `<div class="tpl-wrap">${state.templates.map(tsk=>`
      <button class="tpl" data-action="tpl" data-title="${esc(tsk.title)}" data-points="${tsk.points}">${esc(tsk.title)} <b>+${tsk.points}</b></button>
    `).join("")}</div>`;
  }

  let byChild = state.children.map(k=>{

    const items = list.length===0
      ? `<div class="muted" style="padding:8px 2px">${t("noTasksAssigned")}</div>`

        const ex = isExtreme(tsk);

          ? ` · ${extremeEmoji(tsk)} ${t("mode"+(tsk.extremeMode||"solo").charAt(0).toUpperCase()+(tsk.extremeMode||"solo").slice(1))}${shared?" · "+t("sharedTag"):""}`
          : "";
        return `
        <div class="row" style="padding:11px 0;border-bottom:1px solid var(--line)">
          <div class="grow">
            <div style="font-weight:800">${ex?extremeEmoji(tsk)+" ":""}${esc(tsk.title)}</div>
            <div class="muted">${tsk.freq==="calendar"?calFreqLabel(tsk):(fl[tsk.freq]||tsk.freq)} · ${taskPeriodName(tsk)} · +${tsk.points} pts${tsk.carryOn?" · ↩️":""}${tsk.incompletePenalty>0?" · −"+tsk.incompletePenalty:""}${exInfo}</div>
          </div>
          <div class="item-actions">
            <button class="icon-btn" data-action="edit-task" data-id="${tsk.id}">✏️</button>
            <button class="icon-btn" data-action="del-task" data-id="${tsk.id}">🗑️</button>
          </div>
        </div>`;}).join("");
    return `
      <div class="card">
        <div class="row" style="margin-bottom:6px">
          <span class="who-chip" style="background:${k.color}">${esc(k.emoji)} ${esc(k.name)}</span>
        </div>
        ${items}
      </div>`;
  }).join("");

  return `
    <button class="add-btn" data-action="new-task">${t("addTask")}</button>
    <div class="card">
      <div class="row" style="margin-bottom:10px;align-items:center">
        <h3 style="font-size:15px;flex:1;margin:0">${t("quickTemplates")}</h3>
        <button class="icon-btn" style="font-size:18px" data-action="toggle-tpl-edit">${tplEditMode?"✕":"✏️"}</button>
      </div>
      ${!tplEditMode?`<div class="muted" style="margin-bottom:10px">${t("quickTemplatesHint")}</div>`:""}
      ${tplContent}
    </div>
    ${byChild}
  `;
}
